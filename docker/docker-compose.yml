# 本地部署：n8n + PostgreSQL
# 使用方式：在项目根目录执行 docker compose up -d
# 访问：http://localhost:5678

volumes:
  postgres-data:
  # n8n-data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: gtw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    command: postgres -c listen_addresses='*'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gtw"]
      interval: 5s
      timeout: 5s
      retries: 5

