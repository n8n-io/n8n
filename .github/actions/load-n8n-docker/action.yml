# Composite action for fetching a n8n docker image tarball (produced by
# build-n8n-docker with distribution=artifact) from the GHA cache and
# loading it into the local docker daemon.
#
# After this action runs, `n8nio/n8n:local` and `n8nio/runners:local` are
# available locally — same tags used by the docker-build path.
#
# On Blacksmith runners, actions/cache is transparently routed through
# Blacksmith's co-located cache (~4× faster than GHA artifacts, which go
# through Azure blob storage).

name: 'Load n8n Docker image from cache'
description: 'Restores a zstd-compressed docker image tarball from the GHA cache and loads it into the local docker daemon.'

inputs:
  artifact-name:
    description: 'Cache key produced by build-n8n-docker.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Restore image tarball from cache
      uses: actions/cache/restore@640a1c2554105b57832a23eea0b4672fc7a790d5 # v4.2.3
      with:
        key: ${{ inputs.artifact-name }}
        path: /tmp/n8n-image.tar.zst
        fail-on-cache-miss: true

    - name: Load image into docker
      shell: bash
      run: zstd -d -c /tmp/n8n-image.tar.zst | docker load
