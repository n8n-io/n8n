name: 'Build Images'

# Phase-1 consolidation: one bake-backed builder, callable per image.
# - workflow_call: the reusable entry the real pipelines (CI/release) will use.
# - push (this branch): verification — proves bake + build-image + the Turbo
#   remote cache + metrics work identically on Blacksmith, not just locally.

on:
  push:
    branches:
      - devp-262-local-turbo-cache-inbuild
    paths:
      - 'docker-bake.hcl'
      - 'docker/images/n8n/Dockerfile.inbuild'
      - 'docker/images/n8n/Dockerfile.inbuild.dockerignore'
      - 'scripts/build-n8n.mjs'
      - 'scripts/build-metrics.mjs'
      - '.github/actions/build-image/action.yml'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
  workflow_call:
    inputs:
      target:
        description: 'docker-bake.hcl target to build.'
        type: string
        default: 'n8n-inbuild'
      platform:
        description: 'Target platform.'
        type: string
        default: 'linux/amd64'
      output:
        description: 'cacheonly | load | push.'
        type: string
        default: 'load'

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 'Bake ${{ inputs.target || ''n8n-inbuild'' }}'
    runs-on: blacksmith-4vcpu-ubuntu-2204
    if: ${{ !github.event.pull_request.head.repo.fork }}
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      # build-metrics.mjs is plain Node (no deps); ensure a node is present.
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.16.0'

      - name: Setup Blacksmith Docker Builder
        uses: useblacksmith/setup-docker-builder@ef12d5b165b596e3aa44ea8198d8fde563eab402 # v1.4.0

      # On-runner Turbo remote cache, musl-namespaced. Exports TURBO_API /
      # TURBO_TOKEN / TURBO_TEAM into the job env for the build below.
      - name: Configure Turborepo Remote Cache (docker/musl namespace)
        uses: rharkor/caching-for-turbo@5d14fba18e450c09393333cfd4242e8b3cb455a6 # v2.4.2
        with:
          cache-prefix: turbogha-n8n-musl_

      - name: Build image
        uses: ./.github/actions/build-image
        with:
          target: ${{ inputs.target || 'n8n-inbuild' }}
          platform: ${{ inputs.platform || 'linux/amd64' }}
          output: ${{ inputs.output || 'load' }}
          turbo-api: ${{ env.TURBO_API }}
          turbo-team: ${{ env.TURBO_TEAM }}
          turbo-token: ${{ env.TURBO_TOKEN }}

  # Non-gating validation of the Phase-1 prepare-docker repoint: host build +
  # parallel `bake ci` (n8n D1 + runner-alpine D4). Proves the parallel build
  # survives Blacksmith's resources before we point the real prepare-docker
  # (which gates e2e) at it. The local run OOM'd a 12-core box at -j max ×2.
  prepare-docker-bake:
    name: 'prepare-docker via bake (validation)'
    runs-on: blacksmith-4vcpu-ubuntu-2204
    if: ${{ !github.event.pull_request.head.repo.fork }}
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Build CI images via bake (host build + parallel bake ci)
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: 'pnpm build:docker:bake'
          enable-docker-cache: true
        env:
          INCLUDE_TEST_CONTROLLER: 'true'

      - name: Smoke — both images boot
        run: |
          docker run --rm n8nio/n8n:local n8n --version
          docker run --rm --entrypoint node n8nio/runners:local --version
