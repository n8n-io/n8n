name: 'Spike: Docker in-build Turbo cache probe'

# DEVP-262 spike v2: prove that a Turbo *remote* cache lets Turbo reuse build
# output across separate `docker buildx build` invocations from inside the
# alpine/musl image.
#
# Why v2: v1 relied on a BuildKit `type=cache` mount for the Turbo cache and
# got zero reuse on Blacksmith — the warm build reported `Cached: 0 cached,
# 59 total` (the v1 assertion was buggy and matched the literal `Cached:`
# label, so it falsely reported success). The mount did not persist between
# builds. v2 points Turbo at a remote cache server instead.
#
# How the probe works:
#   * A Turbo remote cache server (rharkor/caching-for-turbo) runs on the
#     runner, backed by the GitHub Actions cache (Blacksmith-routed). Its
#     coordinates are exported as TURBO_API / TURBO_TOKEN / TURBO_TEAM.
#   * Build #1 (cold) populates the remote cache.
#   * Build #2 (warm) runs with --no-cache to disable Docker's layer cache, so
#     any Turbo cache hit can only come from the remote cache read back over
#     the host network.
#
# Cache separation: `cache-prefix` namespaces this in-image (musl) build's
# Turbo cache away from the outside/host (glibc) build, and the pnpm store
# cache mount is keyed `-musl` in the Dockerfile. musl and glibc artefacts can
# never collide.
#
# Network: the build reaches the localhost cache server via `--network=host`
# (entitlement granted per-build with `--allow network.host`). The token is
# passed as a BuildKit secret, never a build arg, so it never lands in a layer.
#
# This is a timeboxed feasibility spike. Delete once DEVP-262 is closed.

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner for the spike (default: blacksmith-8vcpu-ubuntu-2204).'
        required: false
        default: 'blacksmith-8vcpu-ubuntu-2204'
        type: string
  push:
    branches:
      - cat-bot/run-26628385540

concurrency:
  group: spike-docker-inbuild-cache-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    name: 'Two-build Turbo cache probe'
    runs-on: blacksmith-4vcpu-ubuntu-2204
    permissions:
      contents: read
    timeout-minutes: 90
    env:
      DOCKERFILE: docker/images/n8n/Dockerfile.buildkit-spike
      COLD_LOG: /tmp/spike-build-cold.log
      WARM_LOG: /tmp/spike-build-warm.log
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Blacksmith Docker Builder
        uses: useblacksmith/setup-docker-builder@ef12d5b165b596e3aa44ea8198d8fde563eab402 # v1.4.0

      # Turbo remote cache server on the runner. `cache-prefix` namespaces the
      # cache keys for this in-image (musl) build, separate from the host
      # (glibc) build. Exports TURBO_API / TURBO_TOKEN / TURBO_TEAM into the
      # job env for the build steps below.
      - name: Configure Turborepo Remote Cache (docker/musl namespace)
        uses: rharkor/caching-for-turbo@5d14fba18e450c09393333cfd4242e8b3cb455a6 # v2.4.2
        with:
          cache-prefix: turbogha-n8n-musl_

      - name: Inspect builder
        run: docker buildx inspect --bootstrap

      - name: Build #1 (cold) — populate remote cache
        run: |
          set -o pipefail
          TURBO_TOKEN="$TURBO_TOKEN" docker buildx build \
            -f "$DOCKERFILE" \
            --progress=plain \
            --network=host \
            --allow network.host \
            --build-arg TURBO_API="$TURBO_API" \
            --build-arg TURBO_TEAM="$TURBO_TEAM" \
            --secret id=TURBO_TOKEN,env=TURBO_TOKEN \
            --output=type=cacheonly \
            . 2>&1 | tee "$COLD_LOG"

      - name: Build #2 (warm) — Docker layer cache OFF, remote Turbo cache survives
        run: |
          set -o pipefail
          TURBO_TOKEN="$TURBO_TOKEN" docker buildx build \
            -f "$DOCKERFILE" \
            --progress=plain \
            --no-cache \
            --network=host \
            --allow network.host \
            --build-arg TURBO_API="$TURBO_API" \
            --build-arg TURBO_TEAM="$TURBO_TEAM" \
            --secret id=TURBO_TOKEN,env=TURBO_TOKEN \
            --output=type=cacheonly \
            . 2>&1 | tee "$WARM_LOG"

      - name: Assert Turbo cache hits on warm build
        run: |
          set -euo pipefail

          echo "::group::Cold build log tail"
          tail -n 80 "$COLD_LOG" || true
          echo "::endgroup::"

          echo "::group::Warm build log tail"
          tail -n 80 "$WARM_LOG" || true
          echo "::endgroup::"

          echo "::group::Turbo timing/cache lines (warm build)"
          grep -E "Tasks:|Cached:|Time:|cache hit|FULL TURBO" "$WARM_LOG" || true
          echo "::endgroup::"

          # Parse the actual cached COUNT from Turbo's summary line, e.g.
          #   Cached:    42 cached, 59 total
          # The v1 assertion matched the literal label `Cached:`, which is
          # printed even when 0 tasks are cached — a false green. Parse the
          # number instead.
          cached="$(grep -oE 'Cached:[[:space:]]+[0-9]+ cached' "$WARM_LOG" | grep -oE '[0-9]+' | head -1 || true)"
          cached="${cached:-0}"
          echo "Turbo cached tasks on warm build: ${cached}"

          if [ "${cached}" -gt 0 ]; then
            echo "::notice::Warm build reused ${cached} Turbo tasks from the remote cache — in-image remote caching works."
          else
            echo "::error::Warm build reused 0 Turbo tasks. Remote cache not reachable from the build, not populated, or the cache-prefix/namespace is wrong. Spike inconclusive."
            exit 1
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: spike-docker-inbuild-cache-logs
          path: |
            /tmp/spike-build-cold.log
            /tmp/spike-build-warm.log
          if-no-files-found: warn
          retention-days: 7
