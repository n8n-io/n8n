name: 'Test: Unit'

on:
  workflow_call:
    inputs:
      ref:
        description: GitHub ref to test.
        required: false
        type: string
        default: ''
      nodeVersion:
        description: Version of node to use.
        required: false
        type: string
        default: 24.15.0
      collectCoverage:
        required: false
        default: false
        type: boolean
      merge-base:
        description: |
          Optional base SHA from ci-filter. When set and the caller event is
          merge_group, test jobs scope to packages affected since this SHA
          (turbo `[<sha>]` filter) instead of running the full suite.
        required: false
        default: ''
        type: string
env:
  NODE_OPTIONS: --max-old-space-size=7168

jobs:
  unit-test-backend:
    name: Backend Unit Tests
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    env:
      COVERAGE_ENABLED: ${{ inputs.collectCoverage }} # Coverage collected when true
      MERGE_BASE: ${{ inputs.merge-base }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Build
        uses: ./.github/actions/setup-nodejs
        with:
          node-version: ${{ inputs.nodeVersion }}

      - name: Fetch merge base for affected detection
        if: github.event_name == 'merge_group' && env.MERGE_BASE != ''
        run: git fetch --depth=1 origin "$MERGE_BASE"

      - name: Test Unit
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ] && [ -n "$MERGE_BASE" ]; then
            pnpm turbo run test:unit --continue --filter="[$MERGE_BASE]" --summarize
          else
            pnpm test:ci:backend:unit --summarize
          fi

      - name: Send Test Stats
        if: ${{ !cancelled() }}
        run: node .github/scripts/send-build-stats.mjs || true
        env:
          QA_METRICS_WEBHOOK_URL: ${{ secrets.QA_METRICS_WEBHOOK_URL }}
          QA_METRICS_WEBHOOK_USER: ${{ secrets.QA_METRICS_WEBHOOK_USER }}
          QA_METRICS_WEBHOOK_PASSWORD: ${{ secrets.QA_METRICS_WEBHOOK_PASSWORD }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          name: backend-unit-tests

      - name: Upload coverage to Codecov
        if: env.COVERAGE_ENABLED == 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend-unit
          name: backend-unit
          files: ./packages/**/coverage/cobertura-coverage.xml,./coverage/cobertura-coverage.xml

  integration-test-backend:
    name: Backend Integration Tests
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    env:
      COVERAGE_ENABLED: ${{ inputs.collectCoverage }} # Coverage collected when true
      MERGE_BASE: ${{ inputs.merge-base }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Build
        uses: ./.github/actions/setup-nodejs
        with:
          node-version: ${{ inputs.nodeVersion }}

      - name: Fetch merge base for affected detection
        if: github.event_name == 'merge_group' && env.MERGE_BASE != ''
        run: git fetch --depth=1 origin "$MERGE_BASE"

      - name: Test Integration
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ] && [ -n "$MERGE_BASE" ]; then
            pnpm turbo run test:integration --continue --concurrency=1 --filter="[$MERGE_BASE]" --summarize
          else
            pnpm test:ci:backend:integration --summarize
          fi

      - name: Send Test Stats
        if: ${{ !cancelled() }}
        run: node .github/scripts/send-build-stats.mjs || true
        env:
          QA_METRICS_WEBHOOK_URL: ${{ secrets.QA_METRICS_WEBHOOK_URL }}
          QA_METRICS_WEBHOOK_USER: ${{ secrets.QA_METRICS_WEBHOOK_USER }}
          QA_METRICS_WEBHOOK_PASSWORD: ${{ secrets.QA_METRICS_WEBHOOK_PASSWORD }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          name: backend-integration-tests

      - name: Upload coverage to Codecov
        if: env.COVERAGE_ENABLED == 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend-integration
          name: backend-integration
          files: ./packages/**/coverage/cobertura-coverage.xml,./coverage/cobertura-coverage.xml

  unit-test-nodes:
    name: Nodes Unit Tests
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    env:
      COVERAGE_ENABLED: ${{ inputs.collectCoverage }} # Coverage collected when true
      MERGE_BASE: ${{ inputs.merge-base }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Build
        uses: ./.github/actions/setup-nodejs
        with:
          node-version: ${{ inputs.nodeVersion }}

      - name: Fetch merge base for affected detection
        if: github.event_name == 'merge_group' && env.MERGE_BASE != ''
        run: git fetch --depth=1 origin "$MERGE_BASE"

      - name: Test Nodes
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ] && [ -n "$MERGE_BASE" ]; then
            pnpm turbo run test --filter="n8n-nodes-base[$MERGE_BASE]" --summarize
          else
            pnpm turbo test --filter=n8n-nodes-base --summarize
          fi

      - name: Send Test Stats
        if: ${{ !cancelled() }}
        run: node .github/scripts/send-build-stats.mjs || true
        env:
          QA_METRICS_WEBHOOK_URL: ${{ secrets.QA_METRICS_WEBHOOK_URL }}
          QA_METRICS_WEBHOOK_USER: ${{ secrets.QA_METRICS_WEBHOOK_USER }}
          QA_METRICS_WEBHOOK_PASSWORD: ${{ secrets.QA_METRICS_WEBHOOK_PASSWORD }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          name: nodes-unit-tests

      - name: Upload coverage to Codecov
        if: env.COVERAGE_ENABLED == 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: nodes-unit
          name: nodes-unit
          files: ./packages/**/coverage/cobertura-coverage.xml,./coverage/cobertura-coverage.xml

  unit-test-frontend:
    name: Frontend (${{ matrix.shard }}/2)
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    env:
      COVERAGE_ENABLED: ${{ inputs.collectCoverage }}
      MERGE_BASE: ${{ inputs.merge-base }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Build
        uses: ./.github/actions/setup-nodejs
        with:
          node-version: ${{ inputs.nodeVersion }}

      - name: Fetch merge base for affected detection
        if: github.event_name == 'merge_group' && env.MERGE_BASE != ''
        run: git fetch --depth=1 origin "$MERGE_BASE"

      - name: Test
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ] && [ -n "$MERGE_BASE" ]; then
            pnpm turbo run test --continue --filter="./packages/frontend/**[$MERGE_BASE]" --summarize -- --shard=${{ matrix.shard }}/2
          else
            pnpm test:ci:frontend --summarize -- --shard=${{ matrix.shard }}/2
          fi
        env:
          VITEST_SHARD: ${{ matrix.shard }}/2

      - name: Send Test Stats
        if: ${{ !cancelled() }}
        run: node .github/scripts/send-build-stats.mjs || true
        env:
          QA_METRICS_WEBHOOK_URL: ${{ secrets.QA_METRICS_WEBHOOK_URL }}
          QA_METRICS_WEBHOOK_USER: ${{ secrets.QA_METRICS_WEBHOOK_USER }}
          QA_METRICS_WEBHOOK_PASSWORD: ${{ secrets.QA_METRICS_WEBHOOK_PASSWORD }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          name: frontend-shard-${{ matrix.shard }}-tests

      - name: Upload coverage to Codecov
        if: env.COVERAGE_ENABLED == 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          name: frontend-shard-${{ matrix.shard }}
          files: ./packages/**/coverage/cobertura-coverage.xml,./coverage/cobertura-coverage.xml

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [unit-test-backend, integration-test-backend, unit-test-nodes, unit-test-frontend]
    if: always()
    steps:
      - name: Fail if tests failed
        if: needs.unit-test-backend.result == 'failure' || needs.integration-test-backend.result == 'failure' || needs.unit-test-nodes.result == 'failure' || needs.unit-test-frontend.result == 'failure'
        run: exit 1
