name: 'Test: Unit'

on:
  workflow_call:
    inputs:
      ref:
        description: GitHub ref to test.
        required: false
        type: string
        default: ''
      nodeVersion:
        description: Version of node to use.
        required: false
        type: string
        default: 24.15.0
      collectCoverage:
        required: false
        default: false
        type: boolean
      merge_base:
        description: Merge-base SHA for diff-scoped test runs. Empty disables scoping.
        required: false
        type: string
        default: ''
env:
  NODE_OPTIONS: --max-old-space-size=7168

jobs:
  unit-test-backend:
    name: Backend Unit Tests
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    env:
      COVERAGE_ENABLED: ${{ inputs.collectCoverage }} # Coverage collected when true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Build
        uses: ./.github/actions/setup-nodejs
        with:
          node-version: ${{ inputs.nodeVersion }}

      - name: Test Unit
        run: pnpm test:ci:backend:unit --summarize

      - name: Send Test Stats
        if: ${{ !cancelled() }}
        run: node .github/scripts/send-build-stats.mjs || true
        env:
          QA_METRICS_WEBHOOK_URL: ${{ secrets.QA_METRICS_WEBHOOK_URL }}
          QA_METRICS_WEBHOOK_USER: ${{ secrets.QA_METRICS_WEBHOOK_USER }}
          QA_METRICS_WEBHOOK_PASSWORD: ${{ secrets.QA_METRICS_WEBHOOK_PASSWORD }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          name: backend-unit-tests

      - name: Upload coverage to Codecov
        if: env.COVERAGE_ENABLED == 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend-unit
          name: backend-unit
          files: ./packages/**/coverage/cobertura-coverage.xml,./coverage/cobertura-coverage.xml

  integration-test-backend:
    name: Backend Integration Tests
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    env:
      COVERAGE_ENABLED: ${{ inputs.collectCoverage }} # Coverage collected when true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Build
        uses: ./.github/actions/setup-nodejs
        with:
          node-version: ${{ inputs.nodeVersion }}

      - name: Test Integration
        run: pnpm test:ci:backend:integration --summarize

      - name: Send Test Stats
        if: ${{ !cancelled() }}
        run: node .github/scripts/send-build-stats.mjs || true
        env:
          QA_METRICS_WEBHOOK_URL: ${{ secrets.QA_METRICS_WEBHOOK_URL }}
          QA_METRICS_WEBHOOK_USER: ${{ secrets.QA_METRICS_WEBHOOK_USER }}
          QA_METRICS_WEBHOOK_PASSWORD: ${{ secrets.QA_METRICS_WEBHOOK_PASSWORD }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          name: backend-integration-tests

      - name: Upload coverage to Codecov
        if: env.COVERAGE_ENABLED == 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend-integration
          name: backend-integration
          files: ./packages/**/coverage/cobertura-coverage.xml,./coverage/cobertura-coverage.xml

  unit-test-nodes:
    name: Nodes Unit Tests
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    env:
      COVERAGE_ENABLED: ${{ inputs.collectCoverage }} # Coverage collected when true
      MERGE_BASE: ${{ inputs.merge_base }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          # Full history when scoping, so $MERGE_BASE...HEAD diff and turbo
          # --affected comparisons in the test:changed wrapper resolve
          # reliably. String form avoids the && / || zero-is-falsy footgun.
          fetch-depth: ${{ inputs.merge_base != '' && '0' || '1' }}

      - name: Build
        uses: ./.github/actions/setup-nodejs
        with:
          node-version: ${{ inputs.nodeVersion }}

      - name: Test Nodes
        env:
          # Align turbo --affected with the wrapper's diff base.
          TURBO_SCM_BASE: ${{ inputs.merge_base }}
        run: |
          if [ -n "${MERGE_BASE:-}" ]; then
            # PR / merge-queue: turbo gates by affected packages, wrapper
            # scopes by file-level diff via jest --changedSince.
            pnpm turbo test:changed --filter=n8n-nodes-base --affected --summarize
          else
            # Master / nightly / release: canonical full run.
            pnpm turbo test --filter=n8n-nodes-base --summarize
          fi

      - name: Send Test Stats
        if: ${{ !cancelled() }}
        run: node .github/scripts/send-build-stats.mjs || true
        env:
          QA_METRICS_WEBHOOK_URL: ${{ secrets.QA_METRICS_WEBHOOK_URL }}
          QA_METRICS_WEBHOOK_USER: ${{ secrets.QA_METRICS_WEBHOOK_USER }}
          QA_METRICS_WEBHOOK_PASSWORD: ${{ secrets.QA_METRICS_WEBHOOK_PASSWORD }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          name: nodes-unit-tests

      - name: Upload coverage to Codecov
        if: env.COVERAGE_ENABLED == 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: nodes-unit
          name: nodes-unit
          files: ./packages/**/coverage/cobertura-coverage.xml,./coverage/cobertura-coverage.xml

  unit-test-frontend:
    name: Frontend (${{ matrix.shard }}/2)
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    env:
      COVERAGE_ENABLED: ${{ inputs.collectCoverage }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Build
        uses: ./.github/actions/setup-nodejs
        with:
          node-version: ${{ inputs.nodeVersion }}

      - name: Test
        run: pnpm test:ci:frontend --summarize -- --shard=${{ matrix.shard }}/2
        env:
          VITEST_SHARD: ${{ matrix.shard }}/2

      - name: Send Test Stats
        if: ${{ !cancelled() }}
        run: node .github/scripts/send-build-stats.mjs || true
        env:
          QA_METRICS_WEBHOOK_URL: ${{ secrets.QA_METRICS_WEBHOOK_URL }}
          QA_METRICS_WEBHOOK_USER: ${{ secrets.QA_METRICS_WEBHOOK_USER }}
          QA_METRICS_WEBHOOK_PASSWORD: ${{ secrets.QA_METRICS_WEBHOOK_PASSWORD }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          name: frontend-shard-${{ matrix.shard }}-tests

      - name: Upload coverage to Codecov
        if: env.COVERAGE_ENABLED == 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          name: frontend-shard-${{ matrix.shard }}
          files: ./packages/**/coverage/cobertura-coverage.xml,./coverage/cobertura-coverage.xml

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [unit-test-backend, integration-test-backend, unit-test-nodes, unit-test-frontend]
    if: always()
    steps:
      - name: Fail if tests failed
        if: needs.unit-test-backend.result == 'failure' || needs.integration-test-backend.result == 'failure' || needs.unit-test-nodes.result == 'failure' || needs.unit-test-frontend.result == 'failure'
        run: exit 1
