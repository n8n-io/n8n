name: 'Test: CodSpeed Benchmarks'

on:
  workflow_call:
    inputs:
      ref:
        description: GitHub ref to test.
        required: false
        type: string
        default: ''
  workflow_dispatch:

jobs:
  codspeed:
    name: CodSpeed Benchmarks
    # CodSpeed walltime mode requires linux-tools (perf), which needs matching kernel packages.
    # Blacksmith runners use non-standard kernels, so pin to ubuntu-latest for now.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: ./.github/actions/setup-nodejs

      - name: Run benchmarks
        # TODO: Remove continue-on-error once CodSpeed app is approved and repo is connected
        continue-on-error: true
        uses: CodSpeedHQ/action@2ac572851726409c88c02a307f1ea2632a9ea59b # v4.11.0
        with:
          mode: walltime
          run: pnpm --filter=@n8n/performance bench
