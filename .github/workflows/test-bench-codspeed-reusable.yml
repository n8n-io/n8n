name: 'Test: CodSpeed Benchmarks'

on:
  workflow_call:
    inputs:
      ref:
        description: GitHub ref to test.
        required: false
        type: string
        default: ''
  workflow_dispatch:

jobs:
  codspeed:
    name: CodSpeed Benchmarks
    # Walltime mode on codspeed-macro bare-metal runners — isolated, no noisy neighbors.
    # 600 free minutes/month for open-source projects.
    runs-on: codspeed-macro
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: ./.github/actions/setup-nodejs

      - name: Run benchmarks
        uses: CodSpeedHQ/action@2ac572851726409c88c02a307f1ea2632a9ea59b # v4.11.0
        with:
          mode: walltime
          run: CODSPEED=true pnpm --filter=@n8n/performance bench
