name: 'Test: E2E Infrastructure'

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # nightly at 02:00 UTC
  pull_request:
    paths:
      - 'packages/testing/playwright/tests/infrastructure/**'
      - 'packages/testing/playwright/utils/benchmark/**'
      - 'packages/testing/playwright/utils/performance-helper.ts'
      - 'packages/testing/playwright/reporters/benchmark-summary-reporter.ts'
      - 'packages/testing/containers/services/**'
      - '.github/workflows/test-e2e-infrastructure-reusable.yml'

concurrency:
  group: e2e-infrastructure-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare-docker:
    uses: ./.github/workflows/prepare-docker-reusable.yml
    secrets: inherit

  benchmark:
    needs: [prepare-docker]
    name: ${{ matrix.lane }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: ui
            grep: '@bench:ui'
            shard: ''
          - lane: webhook
            grep: '@bench:webhook'
            shard: ''
          - lane: kafka-1
            grep: '@bench:kafka'
            shard: '--shard=1/2'
          - lane: kafka-2
            grep: '@bench:kafka'
            shard: '--shard=2/2'
    uses: ./.github/workflows/test-e2e-reusable.yml
    with:
      test-mode: docker-artifact
      # Each spec brings its own container via `test.use({ capability })`,
      # so workers stay at 1. Parallelism is across lanes, not within a lane.
      test-command: 'pnpm --filter=n8n-playwright test:benchmark --grep "${{ matrix.grep }}" ${{ matrix.shard }}'
      workers: '1'
      runner: blacksmith-8vcpu-ubuntu-2204
      timeout-minutes: 120
      artifact-prefix: 'benchmark-${{ matrix.lane }}'
    secrets: inherit
