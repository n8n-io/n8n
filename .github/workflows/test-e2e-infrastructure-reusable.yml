name: 'Test: E2E Infrastructure'

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # nightly at 02:00 UTC
  pull_request:
    paths:
      - 'packages/testing/playwright/tests/infrastructure/**'
      - 'packages/testing/playwright/utils/benchmark/**'
      - 'packages/testing/playwright/utils/performance-helper.ts'
      - 'packages/testing/playwright/reporters/benchmark-summary-reporter.ts'
      - 'packages/testing/containers/services/**'
      - '.github/workflows/test-e2e-infrastructure-reusable.yml'

concurrency:
  group: e2e-infrastructure-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare-docker:
    uses: ./.github/workflows/prepare-docker-reusable.yml
    secrets: inherit

  benchmark:
    needs: [prepare-docker]
    name: ${{ matrix.lane }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: ui
            grep: '@bench:ui'
            shards: '[{"shard":1,"images":""}]'
          - lane: webhook
            grep: '@bench:webhook'
            shards: '[{"shard":1,"images":""}]'
          - lane: kafka
            grep: '@bench:kafka'
            # 2-shard matrix → reusable workflow spawns two sub-jobs, each runs --shard=N/2.
            # Lane fan-out (ui + webhook + kafka×2) = 4 parallel runners after one shared
            # prepare-docker.
            shards: '[{"shard":1,"images":""},{"shard":2,"images":""}]'
    uses: ./.github/workflows/test-e2e-reusable.yml
    with:
      test-mode: docker-artifact
      # No quotes around the grep value — the reusable workflow runs $TEST_COMMAND
      # unquoted and bash word-splits, so any literal " would survive into the arg.
      # `@bench:<lane>` has no shell-special chars; pnpm forwards it cleanly.
      test-command: 'pnpm --filter=n8n-playwright test:benchmark --grep ${{ matrix.grep }}'
      pre-generated-matrix: ${{ matrix.shards }}
      # Each spec brings its own container via `test.use({ capability })`,
      # so workers stay at 1 (one container at a time per shard).
      workers: '1'
      runner: blacksmith-8vcpu-ubuntu-2204
      timeout-minutes: 120
      artifact-prefix: 'benchmark-${{ matrix.lane }}'
    secrets: inherit
