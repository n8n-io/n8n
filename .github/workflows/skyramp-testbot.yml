name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  testbot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # Generate a GitHub App installation token to retrigger CI workflows on push
      # https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/making-authenticated-api-requests-with-a-github-app-in-a-github-actions-workflow
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.SKYRAMP_TESTBOT_APP_ID }}
          private-key: ${{ secrets.SKYRAMP_TESTBOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - uses: skyramp/testbot@v0.5.2
        with:
          skyramp_license_file: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropic_api_key: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          skyramp_mcp_version: next
          skyramp_executor_version: v1.3.14
          auth_token_command: "./deployment-testbot/get-token.sh"
          target_setup_command: "./deployment-testbot/setup.sh"

          test_directory: "skyramp-tests"
          auto_commit: true
          post_pr_comment: true
          enable_debug: true
          commit_message: "TestBot: update tests"
