name: 'Util: Eval Roster Snapshot'

# Snapshots the Instance AI eval test-case roster (slug + full case content) to
# BigQuery on every merge to master that touches the fixtures. Powers the roster
# KPIs (total test cases, cases added/week). See Linear TRUST-199.
#
# Inert until the BigQuery service account is configured — the gate step skips
# the snapshot (with a notice) when GCP_EVAL_ROSTER_SA is unset.
on:
  push:
    branches: [master]
    paths:
      - 'packages/@n8n/instance-ai/evaluations/data/workflows/**'
  workflow_dispatch: {}

jobs:
  snapshot:
    name: Snapshot roster to BigQuery
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check BigQuery service account is configured
        id: gate
        env:
          SA: ${{ secrets.GCP_EVAL_ROSTER_SA }}
        run: |
          if [ -n "$SA" ]; then
            echo 'ok=true' >> "$GITHUB_OUTPUT"
          else
            echo 'ok=false' >> "$GITHUB_OUTPUT"
            echo '::notice::GCP_EVAL_ROSTER_SA not set — skipping roster snapshot (configure to enable).'
          fi

      - name: Checkout
        if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4

      - name: Build roster snapshot (NDJSON, with content)
        if: steps.gate.outputs.ok == 'true'
        run: |
          DIR=packages/@n8n/instance-ai/evaluations/data/workflows
          : > roster.ndjson
          for f in "$DIR"/*.json; do
            jq -c \
              --arg d "$(date -u +%F)" \
              --arg s "$GITHUB_SHA" \
              --arg slug "$(basename "$f" .json)" \
              '{snapshot_date: $d, commit_sha: $s, slug: $slug, content: .}' \
              "$f" >> roster.ndjson
          done
          echo "Snapshotted $(wc -l < roster.ndjson) test cases."

      - name: Authenticate to Google Cloud
        if: steps.gate.outputs.ok == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_EVAL_ROSTER_SA }}

      - name: Set up gcloud
        if: steps.gate.outputs.ok == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Load snapshot into BigQuery
        if: steps.gate.outputs.ok == 'true'
        run: |
          bq load \
            --source_format=NEWLINE_DELIMITED_JSON \
            n8n-telemetry:eval_analytics.eval_roster_history \
            roster.ndjson \
            snapshot_date:DATE,commit_sha:STRING,slug:STRING,content:JSON
