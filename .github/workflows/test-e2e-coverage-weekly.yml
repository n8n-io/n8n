name: 'Test: E2E Coverage Weekly'

on:
  schedule:
    - cron: '0 2 * * 1' # Every Monday at 2 AM
  workflow_dispatch: # Allow manual triggering

jobs:
  prepare-docker:
    name: Prepare Docker (coverage)
    uses: ./.github/workflows/prepare-docker-reusable.yml
    with:
      build-variant: coverage
      runner: blacksmith-8vcpu-ubuntu-2204
    secrets: inherit

  # Inlined (not using test-e2e-reusable.yml) because coverage runs need
  # `BUILD_WITH_COVERAGE=true` at test time plus per-shard `.nyc_output`
  # capture, and pushing those into the shared reusable workflow polluted it
  # with coverage-only conditionals that no other caller exercises.
  e2e:
    name: E2E (coverage)
    needs: prepare-docker
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      PLAYWRIGHT_BROWSERS_PATH: packages/testing/playwright/.playwright-browsers
      TEST_IMAGE_N8N: 'n8nio/n8n:local'
      N8N_SKIP_LICENSES: 'true'
      CURRENTS_CI_BUILD_ID: ${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}
      CURRENTS_PROJECT_ID: 'LRxcNt'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Environment
        uses: ./.github/actions/setup-nodejs

      - name: Install Browsers
        run: pnpm turbo run install-browsers --filter=n8n-playwright

      - name: Load n8n image from cache
        uses: ./.github/actions/load-n8n-docker

      - name: Pre-pull Test Container Images
        run: npx tsx packages/testing/containers/pull-test-images.ts || true

      - name: Run Tests
        run: pnpm --filter=n8n-playwright test:container:coverage --workers=1 --shard=${{ matrix.shard }}/4
        env:
          CURRENTS_RECORD_KEY: ${{ secrets.CURRENTS_RECORD_KEY }}
          N8N_LICENSE_ACTIVATION_KEY: ${{ secrets.N8N_LICENSE_ACTIVATION_KEY }}
          N8N_LICENSE_CERT: ${{ secrets.N8N_LICENSE_CERT }}
          N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          BUILD_WITH_COVERAGE: 'true'

      - name: Upload .nyc_output (per shard)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nyc-output-shard-${{ matrix.shard }}
          path: packages/testing/playwright/.nyc_output/coverage/
          retention-days: 1
          if-no-files-found: ignore

      - name: Cancel Currents run if workflow is cancelled
        if: cancelled()
        env:
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
        run: |
          if [ -n "$CURRENTS_API_KEY" ]; then
            curl --location --request PUT \
              "https://api.currents.dev/v1/runs/cancel-ci/github" \
              --header "Authorization: Bearer $CURRENTS_API_KEY" \
              --header "Content-Type: application/json" \
              --data "{\"githubRunId\": \"${{ github.run_id }}\", \"githubRunAttempt\": \"${{ github.run_attempt }}\"}"
          fi

  aggregate:
    name: Aggregate Coverage
    needs: e2e
    if: always() && needs.e2e.result != 'skipped' && needs.e2e.result != 'cancelled'
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment
        uses: ./.github/actions/setup-nodejs

      - name: Download .nyc_output from all shards
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: nyc-output-shard-*
          path: /tmp/nyc-shards/

      - name: Merge shard outputs into .nyc_output/coverage
        shell: bash
        run: |
          mkdir -p packages/testing/playwright/.nyc_output/coverage
          shopt -s nullglob
          for shard in /tmp/nyc-shards/nyc-output-shard-*/; do
            echo "Merging from $shard"
            cp "$shard"*.json packages/testing/playwright/.nyc_output/coverage/ 2>/dev/null || true
          done
          echo "--- Combined .nyc_output/coverage file count:"
          find packages/testing/playwright/.nyc_output/coverage/ -maxdepth 1 -type f -name '*.json' | wc -l

      - name: Generate Coverage Report
        run: pnpm --filter n8n-playwright coverage:report

      - name: Upload Coverage Report Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: packages/testing/playwright/coverage/
          retention-days: 14

      - name: Upload E2E Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/testing/playwright/coverage/lcov.info
          flags: frontend-e2e
          name: playwright-e2e
          fail_ci_if_error: false

      - name: Analyse Coverage Gaps
        if: always()
        env:
          CODECOV_API_TOKEN: ${{ secrets.CODECOV_API_TOKEN }}
        run: |
          node packages/testing/playwright/scripts/coverage-analysis.mjs \
            --md --top=15 --out-json=coverage-gaps.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Gap Report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-gap-report
          path: coverage-gaps.json
          retention-days: 21
