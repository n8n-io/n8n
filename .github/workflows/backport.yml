name: 'Util: Backport pull request changes'

run-name: Backport pull request ${{ github.event.pull_request.number || inputs.pull-request-id }}

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pull-request-id:
        description: 'The ID number of the pull request (e.g. 3342). No #, no extra letters.'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    if: |
      github.event.pull_request.merged == true ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-slim
    outputs:
      target_branches: ${{ steps.targets.outputs.target_branches }}
      created_pull_numbers: ${{ steps.backport.outputs.created_pull_numbers }}
      was_successful: ${{ steps.backport.outputs.was_successful }}
      was_successful_by_branch: ${{ steps.backport.outputs.was_successful_by_branch }}
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.N8N_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.N8N_ASSISTANT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: ''
          install-command: pnpm install --frozen-lockfile --dir ./.github/scripts --ignore-workspace
          cache-dependency-path: .github/scripts/pnpm-lock.yaml

      - name: Compute backport targets
        id: targets
        env:
          PULL_REQUEST_ID: ${{ inputs.pull-request-id }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: node .github/scripts/compute-backport-targets.mjs

      - name: Backport
        id: backport
        if: steps.targets.outputs.target_branches != ''
        uses: korthout/backport-action@4aaf0e03a94ff0a619c9a511b61aeb42adea5b02 # v4.2.0
        with:
          github_token: ${{ steps.generate-token.outputs.token }}
          source_pr_number: ${{ github.event.pull_request.number || inputs.pull-request-id }}
          target_branches: ${{ steps.targets.outputs.target_branches }}
          pull_description: |-
            # Description
            Backport of #${pull_number} to `${target_branch}`.

            ## Checklist for the author (@${pull_author}) to go through.

            - [ ] Review the backport changes
            - [ ] Fix possible conflicts
            - [ ] Merge to target branch

            After this PR has been merged, it will be picked up in the next patch release for release track.

            # Original description

            ${pull_description}
          pull_title: ${pull_title} (backport to ${target_branch})
          add_author_as_assignee: true
          add_author_as_reviewer: true
          copy_assignees: true
          copy_requested_reviewers: false
          copy_labels_pattern: '^(?!Backport to\b).+' # Copy everything except backport labels
          add_labels: 'automation:backport'
          experimental: >
            {
              "conflict_resolution": "draft_commit_conflicts"
            }

      - name: Summarize backport results
        if: always() && steps.targets.outputs.target_branches != ''
        env:
          TARGET_BRANCHES: ${{ steps.targets.outputs.target_branches }}
          WAS_SUCCESSFUL: ${{ steps.backport.outputs.was_successful }}
          WAS_SUCCESSFUL_BY_BRANCH: ${{ steps.backport.outputs.was_successful_by_branch }}
          CREATED_PULL_NUMBERS: ${{ steps.backport.outputs.created_pull_numbers }}
        run: |
          {
            echo "## Backport results"
            echo ""
            echo "- **Target branches:** ${TARGET_BRANCHES:-(none)}"
            echo "- **All backports successful:** ${WAS_SUCCESSFUL:-unknown}"
            echo "- **Per-branch result:** ${WAS_SUCCESSFUL_BY_BRANCH:-(none)}"
            echo "- **Created PRs:** ${CREATED_PULL_NUMBERS:-(none)}"
            echo ""
            if [ "${WAS_SUCCESSFUL:-}" = "true" ]; then
              echo "All backport PRs were created without conflicts and will have auto-merge enabled."
            else
              echo "One or more backports had conflicts. Conflict PRs are opened as drafts and must be resolved manually; conflict-free PRs will have auto-merge enabled."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  auto-merge-backports:
    needs: backport
    if: needs.backport.outputs.created_pull_numbers != ''
    runs-on: ubuntu-slim
    environment: release
    steps:
      - name: Generate Release Helper Token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.N8N_RELEASE_HELPER_APP_ID }}
          private-key: ${{ secrets.N8N_RELEASE_HELPER_PRIVATE_KEY }}

      - name: Approve and enable auto-merge for conflict-free backport PRs
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBERS: ${{ needs.backport.outputs.created_pull_numbers }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          IFS=',' read -ra NUMBERS <<< "$PR_NUMBERS"
          for raw in "${NUMBERS[@]}"; do
            PR="${raw// /}"
            [ -z "$PR" ] && continue
            IS_DRAFT=$(gh pr view "$PR" --repo "$REPOSITORY" --json isDraft -q .isDraft)
            if [ "$IS_DRAFT" = "true" ]; then
              echo "PR #$PR has conflicts (draft) — skipping auto-merge"
              continue
            fi
            echo "Approving and enabling auto-merge for PR #$PR"
            gh pr review "$PR" --approve --repo "$REPOSITORY"
            gh pr merge "$PR" --auto --squash --repo "$REPOSITORY"
          done
