name: 'Test: Visual Chromatic'

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: GitHub ref to check out.
        required: false
        type: string
        default: ''
    outputs:
      change_count:
        description: Number of visual changes detected by Chromatic.
        value: ${{ jobs.chromatic.outputs.change_count }}
      build_url:
        description: URL of the Chromatic build.
        value: ${{ jobs.chromatic.outputs.build_url }}
      ui_review_url:
        description: URL of the Chromatic UI Review check details.
        value: ${{ jobs.chromatic-resolve-urls-and-report.outputs.ui_review_url }}

jobs:
  chromatic:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    outputs:
      change_count: ${{ steps.chromatic_tests.outputs.changeCount }}
      build_url: ${{ steps.chromatic_tests.outputs.buildUrl }}
    permissions:
      checks: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: pnpm run build --filter=@n8n/utils --filter=@n8n/vitest-config --filter=@n8n/chat --filter=@n8n/design-system

      - name: Publish to Chromatic
        uses: chromaui/action@1cfa065cbdab28f6ca3afaeb3d761383076a35aa # v11
        id: chromatic_tests
        with:
          workingDir: packages/frontend/@n8n/storybook
          buildScriptName: build
          autoAcceptChanges: 'master'
          skip: 'release/**'
          onlyChanged: true
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true

  chromatic-resolve-urls-and-report:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: [chromatic]
    outputs:
      ui_review_url: ${{ steps.resolve_ui_review_url.outputs.ui_review_url }}
    permissions:
      checks: read
      contents: read
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.N8N_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.N8N_ASSISTANT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: ''
          install-command: pnpm install --frozen-lockfile --dir ./.github/scripts --ignore-workspace

      - name: Resolve UI Review URL
        if: always() && github.event.pull_request.number && needs.chromatic.outputs.build_url
        id: resolve_ui_review_url
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          BUILD_URL: ${{ needs.chromatic.outputs.build_url }}
        run: node ./.github/scripts/find-chromatic-review-url.mjs


      - name: Comment visual regression results on PR
        if: always() && github.event.pull_request.number && needs.chromatic.outputs.build_url
        env:
          CHANGE_COUNT: ${{ needs.chromatic.outputs.change_count }}
          BUILD_URL: ${{ needs.chromatic.outputs.build_url }}
          UI_REVIEW_URL: ${{ steps.resolve_ui_review_url.outputs.ui_review_url }}
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: node ./.github/scripts/chromatic-comment-visual-regressions.mjs
