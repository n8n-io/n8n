name: 'Test: E2E CI'

on:
  workflow_call:
    inputs:
      branch:
        description: 'GitHub branch/ref to test'
        required: false
        type: string
        default: ''
      matrix:
        description: 'Pre-computed shard matrix JSON (from distribute-tests.mjs). Caller owns generation.'
        required: true
        type: string
      skip-tests:
        description: 'If true, impact analysis determined no specs need to run — full-suite jobs are skipped.'
        required: false
        type: boolean
        default: false
      n8n-env:
        description: 'JSON string of n8n env vars to inject into test containers, e.g. {"N8N_EXPRESSION_ENGINE":"vm"}'
        required: false
        type: string
        default: ''
      community-mode:
        description: 'true routes to the community (fork) path: sqlite-only, skip @licensed tests.'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      branch:
        description: 'GitHub branch/ref to test'
        required: false
        type: string
        default: ''
      matrix:
        description: 'Pre-computed shard matrix JSON (from distribute-tests.mjs). Caller owns generation.'
        required: true
        type: string
      skip-tests:
        description: 'If true, impact analysis determined no specs need to run — full-suite jobs are skipped.'
        required: false
        type: boolean
        default: false
      n8n-env:
        description: 'JSON string of n8n env vars to inject into test containers (e.g. {"N8N_EXPRESSION_ENGINE":"vm"})'
        required: false
        type: string
        default: ''
      community-mode:
        description: 'true routes to the community (fork) path: sqlite-only, skip @licensed tests.'
        required: false
        type: boolean
        default: false

# Assumes the caller has already populated the SHA-keyed Docker image cache
# (via prepare-docker-reusable.yml) before invoking this workflow.

jobs:
  # Internal-only 1-spec fail-fast sanity check on sqlite.
  sqlite-sanity:
    name: 'SQLite: Sanity Check'
    if: ${{ !inputs.community-mode }}
    uses: ./.github/workflows/test-e2e-reusable.yml
    with:
      branch: ${{ inputs.branch }}
      test-mode: docker-artifact
      test-command: pnpm --filter=n8n-playwright test:container:sqlite:e2e tests/e2e/building-blocks/workflow-entry-points.spec.ts
      workers: '1'
      n8n-env: ${{ inputs.n8n-env }}
    secrets: inherit

  # Internal-only full run: postgres + redis + caddy + 2 mains + 1 worker.
  # Requires enterprise license secrets so cannot run in community mode.
  multi-main-e2e:
    name: 'Multi-Main: E2E'
    if: ${{ !inputs.community-mode && !inputs.skip-tests }}
    uses: ./.github/workflows/test-e2e-reusable.yml
    with:
      branch: ${{ inputs.branch }}
      test-mode: docker-artifact
      test-command: pnpm --filter=n8n-playwright test:container:multi-main:e2e
      workers: '1'
      pre-generated-matrix: ${{ inputs.matrix }}
      n8n-env: ${{ inputs.n8n-env }}
    secrets: inherit

  # Community-mode full run on sqlite (no enterprise license needed).
  # Excludes @licensed tests since community contributors have no license secrets.
  community-sqlite-e2e:
    name: 'SQLite: E2E (community)'
    if: ${{ inputs.community-mode && !inputs.skip-tests }}
    uses: ./.github/workflows/test-e2e-reusable.yml
    with:
      branch: ${{ inputs.branch }}
      test-mode: docker-artifact
      test-command: pnpm --filter=n8n-playwright test:container:sqlite:e2e --grep-invert="@licensed"
      workers: '1'
      pre-generated-matrix: ${{ inputs.matrix }}
      n8n-env: ${{ inputs.n8n-env }}
      upload-failure-artifacts: true
    secrets: inherit
