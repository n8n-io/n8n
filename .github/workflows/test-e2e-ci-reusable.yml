name: 'Test: E2E CI'

on:
  workflow_call:
    inputs:
      branch:
        description: 'GitHub branch/ref to test'
        required: false
        type: string
        default: ''
      playwright-only:
        description: 'Only Playwright files changed — run impacted tests only'
        required: false
        type: boolean
        default: false
      n8n-env:
        description: 'JSON string of n8n env vars to inject into test containers, e.g. {"N8N_EXPRESSION_ENGINE":"vm"}'
        required: false
        type: string
        default: ''
      community-mode:
        description: 'true routes to the community (fork) path: sqlite-only, load image from artifact, skip license-dependent tests.'
        required: false
        type: boolean
        default: false
      # GHCR image ref in internal mode, artifact name in community mode.
      docker-ref:
        description: 'Image ref (internal) or artifact name (community) produced by prepare-docker.'
        required: false
        type: string
        default: ''
      image-tag:
        description: 'Tag used by prepare-docker. Needed for GHCR cleanup.'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      branch:
        description: 'GitHub branch/ref to test'
        required: false
        type: string
        default: ''
      playwright-only:
        description: 'Only Playwright files changed — run impacted tests only'
        required: false
        type: boolean
        default: false
      n8n-env:
        description: 'JSON string of n8n env vars to inject into test containers (e.g. {"N8N_EXPRESSION_ENGINE":"vm"})'
        required: false
        type: string
        default: ''
      community-mode:
        description: 'true routes to the community (fork) path: sqlite-only, load image from artifact, skip license-dependent tests.'
        required: false
        type: boolean
        default: false
      docker-ref:
        description: 'Image ref (internal) or artifact name (community) produced by prepare-docker.'
        required: false
        type: string
        default: ''
      image-tag:
        description: 'Tag used by prepare-docker. Needed for GHCR cleanup.'
        required: false
        type: string
        default: ''

jobs:
  prepare-matrix:
    name: 'Prepare Matrix'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
      skip-tests: ${{ steps.generate-matrix.outputs.skip-tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 1

      - name: Setup Environment
        uses: ./.github/actions/setup-nodejs
        with:
          # Matrix generation calls the janitor CLI (via distribute-tests.mjs),
          # which needs packages/testing/janitor/dist/cli.js on disk.
          build-command: 'pnpm turbo run build --filter=@n8n/playwright-janitor'

      - name: Get changed files for impact analysis
        if: ${{ inputs.playwright-only }}
        id: changed-files
        run: |
          git fetch --depth=1 origin ${{ github.event.pull_request.base.ref || 'master' }}
          echo "list=$(git diff --name-only FETCH_HEAD HEAD | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"

      - name: Generate shard matrix
        id: generate-matrix
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.list }}
        run: |
          ARGS=(--matrix 16 --orchestrate)
          if [[ "${{ inputs.playwright-only }}" == "true" ]]; then
            ARGS+=(--impact "--files=$CHANGED_FILES" "--base=FETCH_HEAD")
          fi
          MATRIX=$(node packages/testing/playwright/scripts/distribute-tests.mjs "${ARGS[@]}")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "skip-tests=$(node -e "process.stdout.write(JSON.parse(process.argv[1])[0]?.skip === true ? 'true' : 'false')" "$MATRIX")" >> "$GITHUB_OUTPUT"

  # Internal-only 1-spec fail-fast sanity check on sqlite.
  sqlite-sanity:
    name: 'SQLite: Sanity Check'
    if: ${{ !inputs.community-mode }}
    uses: ./.github/workflows/test-e2e-reusable.yml
    with:
      branch: ${{ inputs.branch }}
      test-mode: docker-pull
      docker-image: ${{ inputs.docker-ref }}
      test-command: pnpm --filter=n8n-playwright test:container:sqlite:e2e tests/e2e/building-blocks/workflow-entry-points.spec.ts
      runner: blacksmith-2vcpu-ubuntu-2204
      workers: '1'
      n8n-env: ${{ inputs.n8n-env }}

  # Internal-only full run: postgres + redis + caddy + 2 mains + 1 worker.
  # Requires enterprise license secrets so cannot run in community mode.
  multi-main-e2e:
    needs: [prepare-matrix]
    name: 'Multi-Main: E2E'
    if: ${{ !inputs.community-mode && needs.prepare-matrix.outputs.skip-tests != 'true' }}
    uses: ./.github/workflows/test-e2e-reusable.yml
    with:
      branch: ${{ inputs.branch }}
      test-mode: docker-pull
      docker-image: ${{ inputs.docker-ref }}
      test-command: pnpm --filter=n8n-playwright test:container:multi-main:e2e
      runner: blacksmith-2vcpu-ubuntu-2204
      workers: '1'
      pre-generated-matrix: ${{ needs.prepare-matrix.outputs.matrix }}
      n8n-env: ${{ inputs.n8n-env }}
    secrets: inherit

  # Community-mode full run on sqlite (no enterprise license needed).
  # Excludes @licensed tests since community contributors have no license secrets.
  # Loads image from the artifact produced by prepare-docker.
  community-sqlite-e2e:
    needs: [prepare-matrix]
    name: 'SQLite: E2E (community)'
    if: ${{ inputs.community-mode && needs.prepare-matrix.outputs.skip-tests != 'true' }}
    uses: ./.github/workflows/test-e2e-reusable.yml
    with:
      branch: ${{ inputs.branch }}
      test-mode: docker-artifact
      docker-artifact-name: ${{ inputs.docker-ref }}
      test-command: pnpm --filter=n8n-playwright test:container:sqlite:e2e --grep-invert="@licensed"
      runner: blacksmith-2vcpu-ubuntu-2204
      workers: '1'
      pre-generated-matrix: ${{ needs.prepare-matrix.outputs.matrix }}
      n8n-env: ${{ inputs.n8n-env }}
      upload-failure-artifacts: true

  # Cleanup ephemeral Docker image from GHCR after tests complete.
  # Skipped in community mode (no GHCR push happened, nothing to clean).
  # Local runner cleanup is handled by each test shard in test-e2e-reusable.yml
  cleanup-ghcr:
    name: 'Cleanup GHCR Image'
    needs: [sqlite-sanity, multi-main-e2e]
    if: ${{ !failure() && !cancelled() && !inputs.community-mode && inputs.image-tag != '' }}
    runs-on: blacksmith-2vcpu-ubuntu-2204
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Delete images from GHCR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ORG: ${{ github.repository_owner }}
          GHCR_REPO: ${{ github.event.repository.name }}
        run: node .github/scripts/cleanup-ghcr-images.mjs --tag ${{ inputs.image-tag }}
