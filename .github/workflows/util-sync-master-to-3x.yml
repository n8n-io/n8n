# Syncs the master branch into the long-lived 3.x branch daily.
#
# During the v3 development window, master carries normal feature work (behind
# opt-in flags) and 3.x is "master + breaking-change commits". This workflow
# fast-forwards 3.x when possible, falls back to a three-way merge when 3.x has
# diverged, and — when a merge conflict occurs — opens a draft conflict PR and
# posts to #v3-sync. No further syncs run until that PR is resolved and merged.
#
# See .github/DEVELOPING_V3.md for the full v3 development model.

name: 'Util: Sync master to 3.x'

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# Serialize syncs — never run two at once.
concurrency:
  group: sync-master-to-3x
  cancel-in-progress: false

jobs:
  sync:
    name: Sync master into 3.x
    if: github.repository == 'n8n-io/n8n'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      conflict_pr: ${{ steps.sync.outputs.conflict_pr }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.N8N_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.N8N_ASSISTANT_PRIVATE_KEY }}

      - name: Checkout 3.x
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 3.x
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync master into 3.x
        id: sync
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SYNC_BRANCH: sync/master-to-3x
          CONFLICT_LABEL: 'automation:v3-sync'
        run: |
          set -euo pipefail

          # Halt gate: if a previous conflict PR is still open, do nothing until
          # it is resolved and merged.
          OPEN_PRS=$(gh pr list --state open --label "$CONFLICT_LABEL" --json number --jq 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "An open '$CONFLICT_LABEL' conflict PR exists; skipping sync until it is resolved and merged."
            exit 0
          fi

          git config user.name "n8n-assistant[bot]"
          git config user.email "n8n-assistant[bot]@users.noreply.github.com"

          git fetch origin master

          # `git merge` fast-forwards when 3.x has not diverged from master, and
          # does a three-way merge otherwise. A non-zero exit means a conflict.
          if git merge --no-edit origin/master; then
            git push origin HEAD:3.x
            echo "Synced master into 3.x."
          else
            echo "Merge conflict encountered — opening a conflict PR."
            # Record the conflicted state (with markers) on a PR branch so it can
            # be resolved in review, mirroring the backport conflict convention.
            git add -A
            git commit --no-edit
            git push --force origin "HEAD:refs/heads/${SYNC_BRANCH}"

            # Ensure the label exists (idempotent), then open the draft conflict PR.
            gh label create "$CONFLICT_LABEL" --color B60205 --description "master→3.x sync conflict" --force
            PR_URL=$(gh pr create --draft --base 3.x --head "$SYNC_BRANCH" \
              --label "$CONFLICT_LABEL" \
              --title "chore: Resolve master→3.x sync conflict" \
              --body "Automated \`master\`→\`3.x\` sync hit a merge conflict. Resolve the conflict markers on \`${SYNC_BRANCH}\`, then merge this PR. **Daily syncs are paused until it is merged.**")
            echo "conflict_pr=$PR_URL" >> "$GITHUB_OUTPUT"
          fi

  notify-conflict:
    name: Notify Slack about conflict PR
    needs: [sync]
    if: ${{ needs.sync.outputs.conflict_pr != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/scripts/slack
          sparse-checkout-cone-mode: false
      - name: Notify Slack
        env:
          SLACK_TOKEN: ${{ secrets.QBOT_SLACK_TOKEN }}
          PR_URL: ${{ needs.sync.outputs.conflict_pr }}
        run: |
          node .github/scripts/slack/notify.mjs \
            --channel '#v3-sync' \
            --text "<${PR_URL}|master→3.x sync hit a conflict — resolve this PR>. Daily syncs are paused until it is merged."

  notify-on-failure:
    name: Notify Slack on failure
    needs: [sync]
    if: ${{ always() && needs.sync.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/scripts/slack
          sparse-checkout-cone-mode: false
      - name: Notify Slack
        env:
          SLACK_TOKEN: ${{ secrets.QBOT_SLACK_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node .github/scripts/slack/notify.mjs \
            --channel '#v3-sync' \
            --text "<${RUN_URL}|master→3.x sync workflow failed unexpectedly>"
