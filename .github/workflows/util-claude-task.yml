name: 'Util: Claude Task Runner'

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description - what should Claude do?'
        required: true
        type: string
      resumeUrl:
        description: 'Optional callback URL to call with the result when the workflow completes'
        required: false
        type: string
      model:
        description: 'Claude model to use (e.g., claude-opus-4-6, claude-sonnet-4-5, claude-haiku-4-5)'
        required: false
        type: string
        default: 'claude-sonnet-4-5-20250929'
      continue_last_session:
        description: 'Continue from the last Claude session instead of starting a new one'
        required: false
        type: boolean
        default: false
      use_raw_prompt:
        description: 'Pass the task input directly as the prompt without wrapping it with guidelines and instructions'
        required: false
        type: boolean
        default: false
      max_turns:
        description: 'Maximum conversation turns before Claude stops gracefully'
        required: false
        type: number
      prevent_experiment_status_cleanup:
        description: 'Prevent experiment status cleanup'
        required: false
        type: boolean
        default: false
      ref:
        description: 'Git ref (branch) to check out and commit to'
        required: true
        type: string

jobs:
  run-claude-task:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        with:
          app-id: ${{ secrets.N8N_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.N8N_ASSISTANT_PRIVATE_KEY }}

      - name: Mask resume URL
        if: inputs.resumeUrl != ''
        run: echo "::add-mask::${{ inputs.resumeUrl }}"

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1
          token: ${{ steps.generate_token.outputs.token }}

      - name: Configure git remote with token
        run: git remote set-url origin "https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ github.repository }}.git"

      - name: Setup Node.js
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: ''

      - name: Configure git author
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          echo "Git author configured as: ${{ github.actor }}"

      - name: Restore Claude sessions
        env:
          GH_TOKEN: ${{ github.token }}
          ENCRYPTION_KEY: ${{ secrets.CLAUDE_SESSIONS_ENCRYPTION_KEY }}
        run: |
          ARTIFACT_NAME="claude-sessions-$(echo '${{ inputs.ref }}' | sed 's/[^a-zA-Z0-9._-]/-/g')"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

          if [ -z "$ENCRYPTION_KEY" ]; then
            echo "::warning::CLAUDE_SESSIONS_ENCRYPTION_KEY secret not set. Skipping session restore."
            exit 0
          fi

          # Find the most recent non-expired artifact from a previous run
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=$ARTIFACT_NAME&per_page=1" \
            --jq '.artifacts[] | select(.expired == false) | .id' 2>/dev/null | head -1)

          if [ -z "$ARTIFACT_ID" ]; then
            echo "No previous Claude sessions found for artifact: $ARTIFACT_NAME"
            exit 0
          fi

          echo "Found previous Claude sessions (artifact $ARTIFACT_ID), downloading..."
          if ! gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/claude-sessions-artifact.zip 2>/dev/null; then
            echo "::warning::Failed to download artifact $ARTIFACT_ID. Skipping session restore."
            rm -f /tmp/claude-sessions-artifact.zip
            exit 0
          fi

          unzip -o /tmp/claude-sessions-artifact.zip -d /tmp/claude-sessions-encrypted
          rm /tmp/claude-sessions-artifact.zip

          if [ -f /tmp/claude-sessions-encrypted/claude-sessions.tar.gz.enc ]; then
            mkdir -p ~/.claude/projects
            openssl enc -aes-256-cbc -d -pbkdf2 -iter 100000 \
              -in /tmp/claude-sessions-encrypted/claude-sessions.tar.gz.enc \
              -pass env:ENCRYPTION_KEY \
            | tar xz -C ~/.claude/projects
            echo "Restored and decrypted Claude sessions from previous run."
          else
            echo "::warning::Artifact found but missing encrypted payload. Skipping."
          fi
          rm -rf /tmp/claude-sessions-encrypted

      - name: Prepare Claude prompt
        env:
          INPUT_TASK: ${{ inputs.task }}
          USE_RAW_PROMPT: ${{ inputs.use_raw_prompt }}
        run: node .github/scripts/claude-task/prepare-claude-prompt.mjs

      - name: Mask prompt from logs
        run: |
          echo "::add-mask::${{ inputs.task }}"
          echo "::add-mask::${{ env.CLAUDE_PROMPT }}"

      - name: Create MCP config
        run: |
          cat > /tmp/mcp-config.json << 'MCPEOF'
          {
            "mcpServers": {
              "linear": {
                "command": "npx",
                "args": [
                  "-y",
                  "mcp-remote",
                  "https://mcp.linear.app/mcp",
                  "--header",
                  "Authorization:${AUTH_HEADER}"
                ],
                "env": {
                  "AUTH_HEADER": "Bearer MCP_LINEAR_API_KEY_PLACEHOLDER"
                }
              },
              "notion": {
                "command": "npx",
                "args": ["-y", "@notionhq/notion-mcp-server"],
                "env": {
                  "OPENAPI_MCP_HEADERS": "{\"Authorization\":\"Bearer MCP_NOTION_TOKEN_PLACEHOLDER\",\"Notion-Version\":\"2025-09-03\"}"
                }
              }
            }
          }
          MCPEOF
          sed -i "s|MCP_LINEAR_API_KEY_PLACEHOLDER|${{ secrets.MCP_LINEAR_API_KEY_GROWTH }}|g" /tmp/mcp-config.json
          sed -i "s|MCP_NOTION_TOKEN_PLACEHOLDER|${{ secrets.MCP_NOTION_TOKEN_GROWTH }}|g" /tmp/mcp-config.json

      - name: Run Claude
        id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@ade221fd1c400376a4799977d683a4eda09f9d7c # v1 (latest)
        env:
          MCP_NOTION_TOKEN_GROWTH: ${{ secrets.MCP_NOTION_TOKEN_GROWTH }}
        with:
          display_report: "false"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.generate_token.outputs.token }}
          prompt: ${{ env.CLAUDE_PROMPT }}
          show_full_output: "false"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep",
                  "WebFetch",
                  "WebSearch",
                  "TodoWrite",
                  "Skill",
                  "Task",
                  "mcp__linear__*",
                  "mcp__notion__*"
                ]
              }
            }
          claude_args: |
            ${{ inputs.continue_last_session == true && '--continue' || '' }} --model ${{ inputs.model }} ${{ inputs.max_turns && format('--max-turns {0}', inputs.max_turns) || '' }} --mcp-config /tmp/mcp-config.json

      - name: Push changes
        if: always()
        run: |
          if ! git diff --quiet HEAD "origin/${{ inputs.ref }}" 2>/dev/null; then
            git push origin HEAD:"${{ inputs.ref }}"
          else
            echo "::notice::No changes made by Claude. Skipping push."
          fi

      - name: Upload Claude report to viewer
        id: upload-report
        if: always()
        env:
          CLAUDE_VIEWER_URL: ${{ secrets.CLAUDE_VIEWER_URL }}
          CLAUDE_VIEWER_TOKEN: ${{ secrets.CLAUDE_VIEWER_TOKEN }}
          PROMPT: ${{ inputs.task }}
        run: |
          EXECUTION_FILE="/home/runner/_work/_temp/claude-execution-output.json"

          if [ -z "$CLAUDE_VIEWER_URL" ] || [ -z "$CLAUDE_VIEWER_TOKEN" ]; then
            echo "::warning::CLAUDE_VIEWER_URL or CLAUDE_VIEWER_TOKEN secret not set. Skipping report upload."
            exit 0
          fi

          if [ ! -f "$EXECUTION_FILE" ]; then
            echo "::warning::Execution output file not found. Skipping report upload."
            exit 0
          fi

          RESPONSE=$(jq \
            --arg prompt "$PROMPT" \
            '{ prompt: $prompt, report: . }' \
            "$EXECUTION_FILE" \
          | curl -s -X POST "$CLAUDE_VIEWER_URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $CLAUDE_VIEWER_TOKEN" \
              --data-binary @-)

          LINK=$(echo "$RESPONSE" | jq -r '.link // empty')

          if [ -n "$LINK" ]; then
            echo "::add-mask::$LINK"
            echo "link=$LINK" >> "$GITHUB_OUTPUT"
            echo "Report uploaded successfully."
          else
            echo "::warning::Failed to upload report. Response: $RESPONSE"
          fi

      - name: Send report to webhook
        if: always()
        env:
          INPUT_TASK: ${{ inputs.task }}
          WEBHOOK_URL: ${{ secrets.CLAUDE_REPORT_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.CLAUDE_REPORT_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$WEBHOOK_URL" ] || [ -z "$WEBHOOK_TOKEN" ]; then
            echo "::warning::CLAUDE_REPORT_WEBHOOK_URL or CLAUDE_REPORT_WEBHOOK_TOKEN secret not set. Skipping report."
            exit 0
          fi

          # Check for skill-produced summary
          REPORT=""
          if [ -f /tmp/skill-summary.md ]; then
            REPORT=$(cat /tmp/skill-summary.md)
            echo "Found skill summary (${#REPORT} chars)."
          fi

          if [ -n "$REPORT" ]; then
            echo "Sending report to webhook..."
            jq -n \
              --arg task "$INPUT_TASK" \
              --arg branch "${{ inputs.ref }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg triggered_by "${{ github.actor }}" \
              --arg report "$REPORT" \
              --arg report_url "${{ steps.upload-report.outputs.link }}" \
              --argjson prevent_experiment_status_cleanup "${{ inputs.prevent_experiment_status_cleanup }}" \
              '{task: $task, branch: $branch, run_url: $run_url, triggered_by: $triggered_by, report: $report, report_url: $report_url, prevent_experiment_status_cleanup: $prevent_experiment_status_cleanup}' \
            | curl -s --max-time 30 -w "\nHTTP status: %{http_code}\n" -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $WEBHOOK_TOKEN" \
              --data-binary @-
          else
            echo "::notice::No skill summary found. Skipping webhook report."
          fi

      - name: Summary
        if: always()
        env:
          INPUT_TASK: ${{ inputs.task }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          CLAUDE_SESSION_ID: ${{ steps.claude.outputs.session_id }}
        run: |
          {
            echo "## Claude Task Runner Summary"
            echo ""
            echo "**Task:** _(output suppressed)_"
            echo "**Branch:** ${{ inputs.ref }}"
            echo "**Claude outcome:** $CLAUDE_OUTCOME"
            if [ -n "$CLAUDE_SESSION_ID" ]; then
              echo "**Session ID:** \`$CLAUDE_SESSION_ID\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Claude sessions
        if: always()
        id: encrypt-sessions
        env:
          ENCRYPTION_KEY: ${{ secrets.CLAUDE_SESSIONS_ENCRYPTION_KEY }}
        run: |
          if [ -z "$ENCRYPTION_KEY" ]; then
            echo "::warning::CLAUDE_SESSIONS_ENCRYPTION_KEY secret not set. Skipping session upload."
            exit 0
          fi

          if [ -d ~/.claude/projects ] && [ "$(ls -A ~/.claude/projects)" ]; then
            mkdir -p /tmp/claude-sessions-upload
            tar cz -C ~/.claude/projects . \
            | openssl enc -aes-256-cbc -e -pbkdf2 -iter 100000 \
                -pass env:ENCRYPTION_KEY \
                -out /tmp/claude-sessions-upload/claude-sessions.tar.gz.enc
            echo "Encrypted Claude sessions for upload."
            echo "has_sessions=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No Claude session data found. Skipping upload."
          fi

      - name: Upload Claude sessions artifact
        if: always() && steps.encrypt-sessions.outputs.has_sessions == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: /tmp/claude-sessions-upload/
          retention-days: 30
          overwrite: true

      - name: Call resume url
        if: always() && inputs.resumeUrl != ''
        env:
          RESUME_URL: ${{ inputs.resumeUrl }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          CLAUDE_SESSION_ID: ${{ steps.claude.outputs.session_id }}
          BRANCH_NAME: ${{ inputs.ref }}
        run: node .github/scripts/claude-task/resume-callback.mjs

      - name: Check final status
        if: always()
        run: |
          if [ "${{ steps.claude.outcome }}" = "failure" ]; then
            echo "::error::Claude task failed. Check the 'Run Claude' step logs for details."
            exit 1
          fi
