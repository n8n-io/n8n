name: 'Mutation Health (nightly)'

on:
  # TEMPORARY — remove before merging to master. workflow_dispatch and
  # schedule only register from the default branch, so this push filter
  # is the only way to exercise the workflow against the spike branch
  # before the PR lands.
  push:
    branches:
      - devp-stryker-mvp-spike
  schedule:
    # 03:30 UTC daily — outside CI rush, before EU morning.
    # Only fires once this lands on master.
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      package:
        description: 'Workspace package to mutate'
        type: choice
        options:
          - n8n-workflow
        default: n8n-workflow
      seed-only:
        description: 'Only regenerate + POST the ledger seed; skip mutate.'
        type: boolean
        default: false

permissions:
  contents: read

env:
  PACKAGE_NAME: ${{ github.event.inputs.package || 'n8n-workflow' }}

jobs:
  run:
    name: Mutate one file, ledger writeback
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment
        uses: ./.github/actions/setup-nodejs
        # Default build-command (pnpm build = turbo run build) is the safe
        # choice. Earlier attempts with pnpm filter syntax routed --summarize
        # (appended by the composite action) directly to tsc -p in workspace
        # deps that don't use tsc --build, causing failures.

      - name: Determine package dir
        id: pkg
        run: |
          case "$PACKAGE_NAME" in
            n8n-workflow) echo "dir=packages/workflow" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unsupported package: $PACKAGE_NAME"; exit 1 ;;
          esac

      - name: Seed ledger snapshot
        run: |
          node scripts/mutation-health/seed-ledger.mjs --package-dir ${{ steps.pkg.outputs.dir }}

      - name: POST seed payload to writer webhook
        env:
          WEBHOOK: ${{ secrets.MUTATION_HEALTH_WEBHOOK }}
        run: |
          SEED=${{ steps.pkg.outputs.dir }}/reports/mutation/ledger-seed.json
          if [ -z "$WEBHOOK" ]; then
            echo "::notice::MUTATION_HEALTH_WEBHOOK not set — dry-run mode (seed POST skipped, uploaded as artefact)."
            exit 0
          fi
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data @"$SEED" "$WEBHOOK"
          echo "Seed POSTed."

      - name: Fetch live ledger from BigQuery
        id: ledger
        if: ${{ ! inputs.seed-only }}
        env:
          PKG_DIR: ${{ steps.pkg.outputs.dir }}
        run: |
          LIVE="$PKG_DIR/reports/mutation/live-ledger.json"
          QUERY_FILE="$PKG_DIR/reports/mutation/live-ledger.query.json"
          # Pull current ledger state from BQ via the QA BigQuery API webhook.
          # This is what makes the picker progress through files: rows scored on
          # prior runs come back as green/red, not new, so the picker doesn't
          # keep choosing the alphabetically-first new file every night.
          mkdir -p "$(dirname "$LIVE")"
          jq -n --arg pkg "$PACKAGE_NAME" '{
            query: ("SELECT source_file_path, package, last_score, threshold_at_run, last_checked_at, last_checked_sha, status, attempts, mutants_killed, mutants_survived, mutants_no_coverage, mutants_timeout FROM `n8n-telemetry.imported_n8n.qa_mutation_health_ledger` WHERE package = \"" + $pkg + "\" ORDER BY source_file_path")
          }' > "$QUERY_FILE"
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data @"$QUERY_FILE" \
            'https://internal.users.n8n.cloud/webhook/qa-query' \
          | jq '{ledger: .}' > "$LIVE"
          echo "Live ledger: $(jq '.ledger | length' "$LIVE") row(s)"
          echo "live-path=$LIVE" >> "$GITHUB_OUTPUT"

      - name: Pick next source file
        id: pick
        if: ${{ ! inputs.seed-only }}
        run: |
          # Read the live ledger (post-seed-merge). Picker priority:
          #   new → red → stale → skip green
          # Within red/stale: lowest score first (worst-tested files revisited first).
          picked=$(node scripts/mutation-health/pick-next.mjs --ledger-file "${{ steps.ledger.outputs.live-path }}")
          echo "Picked: $picked"
          src_repo=$(echo "$picked" | jq -r .source_file_path)
          src_rel=${src_repo#${{ steps.pkg.outputs.dir }}/}
          echo "source-rel=$src_rel" >> "$GITHUB_OUTPUT"

      - name: Mutate the picked source file
        if: ${{ ! inputs.seed-only }}
        # Exit 1 (below threshold) is a valid outcome — we still want to emit
        # the payload. Only Stryker hard failures (exit 3) should leave
        # summary.json absent; the emit step handles that gracefully.
        continue-on-error: true
        run: |
          pnpm --filter "$PACKAGE_NAME" mutate ${{ steps.pick.outputs.source-rel }}

      - name: Emit BQ payload
        if: ${{ ! inputs.seed-only }}
        run: |
          SUMMARY=${{ steps.pkg.outputs.dir }}/reports/mutation/summary.json
          if [ ! -f "$SUMMARY" ]; then
            echo "::warning::No summary.json — Stryker did not produce a report. Skipping emit."
            exit 0
          fi
          node scripts/mutation-health/emit-payload.mjs \
            --summary "$SUMMARY" \
            --package "$PACKAGE_NAME"

      - name: POST result payload to writer webhook
        if: ${{ ! inputs.seed-only }}
        env:
          WEBHOOK: ${{ secrets.MUTATION_HEALTH_WEBHOOK }}
        run: |
          PAYLOAD=${{ steps.pkg.outputs.dir }}/reports/mutation/bq-payload.json
          if [ -z "$WEBHOOK" ]; then
            echo "::notice::MUTATION_HEALTH_WEBHOOK not set — dry-run mode (result POST skipped, uploaded as artefact)."
            exit 0
          fi
          if [ ! -f "$PAYLOAD" ]; then
            echo "::warning::No bq-payload.json — nothing to POST."
            exit 0
          fi
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data @"$PAYLOAD" "$WEBHOOK"
          echo "Result POSTed."

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mutation-health-${{ env.PACKAGE_NAME }}-${{ github.run_id }}
          path: |
            ${{ steps.pkg.outputs.dir }}/reports/mutation/raw.json
            ${{ steps.pkg.outputs.dir }}/reports/mutation/raw.html
            ${{ steps.pkg.outputs.dir }}/reports/mutation/summary.json
            ${{ steps.pkg.outputs.dir }}/reports/mutation/bq-payload.json
            ${{ steps.pkg.outputs.dir }}/reports/mutation/ledger-seed.json
          retention-days: 14
          if-no-files-found: warn
