name: 'Mutation Health (nightly)'

on:
  schedule:
    # 03:30 UTC daily — outside CI rush, before EU morning.
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      package:
        description: 'Workspace package to mutate'
        type: choice
        options:
          - n8n-workflow
        default: n8n-workflow

permissions:
  contents: read

env:
  PACKAGE_NAME: ${{ github.event.inputs.package || 'n8n-workflow' }}
  PKG_DIR: packages/workflow # mapping is 1-to-1 for Phase 1; expand when Phase 2 rolls out
  REPORTS_DIR: packages/workflow/reports/mutation
  MUTATION_HEALTH_WEBHOOK: ${{ secrets.MUTATION_HEALTH_WEBHOOK }}

jobs:
  run:
    name: Mutate one file, ledger writeback
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment
        uses: ./.github/actions/setup-nodejs
        # Default build-command (pnpm build = turbo run build) is the safe
        # choice. Bypassing turbo with pnpm-filter syntax routes --summarize
        # to raw tsc in workspace deps that don't use tsc --build.

      - name: Seed ledger
        run: node scripts/mutation-health/seed-ledger.mjs --package-dir "$PKG_DIR"

      - name: POST seed payload
        run: node scripts/mutation-health/post-payload.mjs "$REPORTS_DIR/ledger-seed.json"

      - name: Fetch live ledger from BigQuery
        run: node scripts/mutation-health/fetch-ledger.mjs --package "$PACKAGE_NAME" --out "$REPORTS_DIR/live-ledger.json"

      - name: Pick next source file
        id: pick
        run: |
          picked=$(node scripts/mutation-health/pick-next.mjs --ledger-file "$REPORTS_DIR/live-ledger.json")
          echo "$picked"
          src_rel=$(echo "$picked" | jq -r --arg dir "$PKG_DIR" '.source_file_path | sub("^" + $dir + "/"; "")')
          echo "source-rel=$src_rel" >> "$GITHUB_OUTPUT"

      - name: Mutate the picked source file
        # Exit 1 (below threshold) is a valid outcome — emit step still runs.
        # Only Stryker hard failures (exit 3) leave summary.json absent.
        continue-on-error: true
        run: pnpm --filter "$PACKAGE_NAME" mutate ${{ steps.pick.outputs.source-rel }}

      - name: Emit BQ payload
        run: |
          if [ -f "$REPORTS_DIR/summary.json" ]; then
            node scripts/mutation-health/emit-payload.mjs --summary "$REPORTS_DIR/summary.json" --package "$PACKAGE_NAME"
          else
            echo "::warning::No summary.json — Stryker did not produce a report. Skipping emit."
          fi

      - name: POST result payload
        run: |
          if [ -f "$REPORTS_DIR/bq-payload.json" ]; then
            node scripts/mutation-health/post-payload.mjs "$REPORTS_DIR/bq-payload.json"
          else
            echo "::warning::No bq-payload.json — nothing to POST."
          fi

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mutation-health-${{ env.PACKAGE_NAME }}-${{ github.run_id }}
          path: |
            ${{ env.REPORTS_DIR }}/raw.json
            ${{ env.REPORTS_DIR }}/raw.html
            ${{ env.REPORTS_DIR }}/summary.json
            ${{ env.REPORTS_DIR }}/bq-payload.json
            ${{ env.REPORTS_DIR }}/ledger-seed.json
            ${{ env.REPORTS_DIR }}/live-ledger.json
          retention-days: 14
          if-no-files-found: warn
