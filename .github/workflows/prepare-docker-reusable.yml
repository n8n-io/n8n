name: 'Prepare n8n Docker (reusable)'

# Reusable workflow that builds the n8n + runners CI test images once and
# distributes them to downstream jobs. Resolves GHCR vs artifact based on
# whether the caller is running on an internal or fork PR.
#
# Both paths run on the same (Blacksmith) runner. The split is about GHCR
# write access: fork-triggered workflows have `packages: write` silently
# downgraded to read, so they fall back to uploading a tarball artifact
# that shards download and `docker load`.
#
# Downstream consumers:
#   - needs.<this-job>.outputs.docker-ref → image ref (ghcr mode) OR artifact name (artifact mode)
#   - needs.<this-job>.outputs.image-tag  → e.g. ci-12345 (used for GHCR cleanup)
#
# Downstream derives mode from the caller's fork context, not from this output.

on:
  workflow_call:
    inputs:
      distribution:
        description: "'ghcr', 'artifact', or 'auto' (default: ghcr for internal, artifact for forks)"
        required: false
        default: 'auto'
        type: string
      image-tag:
        description: 'Tag applied to both n8n and runners images. Defaults to ci-<run_id>.'
        required: false
        default: ''
        type: string
      build-variant:
        description: 'standard or coverage'
        required: false
        default: 'standard'
        type: string
      runner:
        description: 'Runner for the build (forks and internal use the same runner).'
        required: false
        default: 'blacksmith-4vcpu-ubuntu-2204'
        type: string
      branch:
        description: 'Git ref to check out.'
        required: false
        default: ''
        type: string
    outputs:
      docker-ref:
        description: 'Image ref (ghcr mode) or artifact name (artifact mode).'
        value: ${{ jobs.prepare.outputs.docker-ref }}
      image-tag:
        description: 'Tag applied to both images. Used by downstream GHCR cleanup.'
        value: ${{ jobs.prepare.outputs.image-tag }}

jobs:
  prepare:
    name: 'Build & publish image'
    runs-on: ${{ inputs.runner }}
    permissions:
      # GitHub silently downgrades `packages: write` to read for fork-triggered
      # workflows. Declaring both is safe: internal PRs get GHCR push, forks get
      # the artifact path (selected by distribution=auto).
      packages: write
      contents: read
    outputs:
      # Coalesce: image is set in ghcr mode, artifact-name in artifact mode.
      docker-ref: ${{ steps.build.outputs.image || steps.build.outputs.artifact-name }}
      image-tag: ${{ steps.resolve.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 1

      - name: Resolve distribution & tag
        id: resolve
        shell: bash
        env:
          REQUESTED: ${{ inputs.distribution }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
          RUN_ID: ${{ github.run_id }}
          INPUT_TAG: ${{ inputs.image-tag }}
        run: |
          if [ "$REQUESTED" = "auto" ]; then
            if [ "$IS_FORK" = "true" ]; then
              echo "distribution=artifact" >> "$GITHUB_OUTPUT"
            else
              echo "distribution=ghcr" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "distribution=$REQUESTED" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$INPUT_TAG" ]; then
            echo "image-tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "image-tag=ci-$RUN_ID" >> "$GITHUB_OUTPUT"
          fi

          echo "artifact-name=n8n-docker-image-$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Build and distribute image
        id: build
        uses: ./.github/actions/build-n8n-docker
        with:
          distribution: ${{ steps.resolve.outputs.distribution }}
          image-tag: ${{ steps.resolve.outputs.image-tag }}
          ghcr-image-base: ghcr.io/${{ github.repository }}
          ghcr-runners-image-base: ghcr.io/${{ github.repository_owner }}/runners
          artifact-name: ${{ steps.resolve.outputs.artifact-name }}
          build-variant: ${{ inputs.build-variant }}
        env:
          QA_METRICS_WEBHOOK_URL: ${{ secrets.QA_METRICS_WEBHOOK_URL }}
          QA_METRICS_WEBHOOK_USER: ${{ secrets.QA_METRICS_WEBHOOK_USER }}
          QA_METRICS_WEBHOOK_PASSWORD: ${{ secrets.QA_METRICS_WEBHOOK_PASSWORD }}
