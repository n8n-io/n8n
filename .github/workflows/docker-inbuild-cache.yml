name: 'Docker In-Build Turbo Cache'

# Proves the in-image n8n build (docker/images/n8n/Dockerfile.inbuild) reuses a
# Turbo *remote* cache across separate `docker buildx build` invocations on CI —
# the in-container → cache-server hop, over the runner's host network.
#
# Two builds run back to back against one remote cache server:
#   * Build #1 (cold): TURBO_FORCE=true makes Turbo re-run every task and ignore
#     the cache, so it's a guaranteed-cold baseline that re-populates the remote
#     cache — the cold→warm delta is therefore visible on EVERY run, not just the
#     first.
#   * Build #2 (warm): --no-cache disables Docker's own layer cache, so any Turbo
#     hit can only come from the remote cache read back over the host network.
#
# Both use `--target builder` (the stage where `pnpm build` runs) so we measure
# the cache-relevant work without the runtime stage / image export. The remote
# cache is namespaced `turbogha-n8n-musl_` to keep this in-image (musl) build's
# artefacts separate from the host (glibc) build's.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docker/images/n8n/Dockerfile.inbuild'
      - 'docker/images/n8n/Dockerfile.inbuild.dockerignore'
      - 'scripts/build-n8n.mjs'
      - 'scripts/turbo-cache.mjs'
      - '.github/workflows/docker-inbuild-cache.yml'

concurrency:
  group: docker-inbuild-cache-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cache:
    name: 'Two-build Turbo cache reuse'
    runs-on: blacksmith-4vcpu-ubuntu-2204
    if: ${{ !github.event.pull_request.head.repo.fork }}
    permissions:
      contents: read
    timeout-minutes: 60
    env:
      DOCKERFILE: docker/images/n8n/Dockerfile.inbuild
      COLD_LOG: /tmp/inbuild-cold.log
      WARM_LOG: /tmp/inbuild-warm.log
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Blacksmith Docker Builder
        uses: useblacksmith/setup-docker-builder@ef12d5b165b596e3aa44ea8198d8fde563eab402 # v1.4.0

      # Remote Turbo cache server on the runner (GHA/Blacksmith-S3-backed).
      # cache-prefix namespaces this in-image (musl) build away from the host
      # (glibc) build. Exports TURBO_API / TURBO_TOKEN / TURBO_TEAM into job env.
      - name: Configure Turborepo Remote Cache (docker/musl namespace)
        uses: rharkor/caching-for-turbo@5d14fba18e450c09393333cfd4242e8b3cb455a6 # v2.4.2
        with:
          cache-prefix: turbogha-n8n-musl_

      - name: Inspect builder
        run: docker buildx inspect --bootstrap

      - name: 'Build #1 (cold) — force-rebuild and populate the remote cache'
        run: |
          set -o pipefail
          start=$SECONDS
          TURBO_TOKEN="$TURBO_TOKEN" docker buildx build \
            -f "$DOCKERFILE" \
            --target builder \
            --progress=plain \
            --no-cache \
            --network=host \
            --allow network.host \
            --provenance=false \
            --sbom=false \
            --build-arg TURBO_API="$TURBO_API" \
            --build-arg TURBO_TEAM="$TURBO_TEAM" \
            --build-arg TURBO_FORCE=true \
            --secret id=TURBO_TOKEN,env=TURBO_TOKEN \
            --output=type=cacheonly \
            . 2>&1 | tee "$COLD_LOG"
          echo "COLD_WALL=$((SECONDS - start))" >> "$GITHUB_ENV"

      - name: 'Build #2 (warm) — Docker layer cache OFF, remote Turbo cache survives'
        run: |
          set -o pipefail
          start=$SECONDS
          TURBO_TOKEN="$TURBO_TOKEN" docker buildx build \
            -f "$DOCKERFILE" \
            --target builder \
            --progress=plain \
            --no-cache \
            --network=host \
            --allow network.host \
            --provenance=false \
            --sbom=false \
            --build-arg TURBO_API="$TURBO_API" \
            --build-arg TURBO_TEAM="$TURBO_TEAM" \
            --secret id=TURBO_TOKEN,env=TURBO_TOKEN \
            --output=type=cacheonly \
            . 2>&1 | tee "$WARM_LOG"
          echo "WARM_WALL=$((SECONDS - start))" >> "$GITHUB_ENV"

      - name: Assert cache reuse and summarize
        run: |
          set -euo pipefail

          # Parse the cached COUNT from Turbo's summary line, e.g.
          #   Cached:    62 cached, 62 total
          # NOT the literal `Cached:` label, which prints even at 0 cached — a
          # false green that bit the original spike.
          parse_cached() { grep -oE 'Cached:[[:space:]]+[0-9]+ cached' "$1" | grep -oE '[0-9]+' | head -1 || true; }
          parse_total()  { grep -oE 'Cached:[[:space:]]+[0-9]+ cached, [0-9]+ total' "$1" | grep -oE '[0-9]+ total' | grep -oE '[0-9]+' | head -1 || true; }
          parse_time()   { grep -oE 'Time:[[:space:]]+[0-9hms.]+' "$1" | tail -1 | sed -E 's/Time:[[:space:]]+//' || true; }

          cold_cached="$(parse_cached "$COLD_LOG")"; cold_cached="${cold_cached:-0}"
          warm_cached="$(parse_cached "$WARM_LOG")"; warm_cached="${warm_cached:-0}"
          total="$(parse_total "$WARM_LOG")"; total="${total:-0}"
          cold_turbo="$(parse_time "$COLD_LOG")"; cold_turbo="${cold_turbo:-n/a}"
          warm_turbo="$(parse_time "$WARM_LOG")"; warm_turbo="${warm_turbo:-n/a}"

          {
            echo "## In-build Turbo cache reuse"
            echo ""
            echo "| Build | Turbo cached | Turbo time | Wall |"
            echo "|-------|-------------|------------|------|"
            echo "| #1 cold (forced) | ${cold_cached}/${total} | ${cold_turbo} | ${COLD_WALL:-?}s |"
            echo "| #2 warm | ${warm_cached}/${total} | ${warm_turbo} | ${WARM_WALL:-?}s |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::group::Turbo lines (warm build)"
          grep -E "Tasks:|Cached:|Time:|FULL TURBO" "$WARM_LOG" || true
          echo "::endgroup::"

          if [ "${warm_cached}" -gt 0 ]; then
            echo "::notice::Warm build reused ${warm_cached}/${total} Turbo tasks from the remote cache over the host network — in-image remote caching works on CI."
          else
            echo "::error::Warm build reused 0 Turbo tasks. The in-container build did not reach the remote cache (network/namespace), or it was not populated."
            exit 1
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-inbuild-cache-logs
          path: |
            /tmp/inbuild-cold.log
            /tmp/inbuild-warm.log
          if-no-files-found: warn
          retention-days: 7
