name: 'Test: E2E Coverage Canary'

# Fast verifying loop for the V8 coverage work (DEVP-205): on every push to the
# feature branch, build the coverage image, run ONE spec through the container
# coverage project (frontend page.coverage + backend NODE_V8_COVERAGE), and
# publish the unified report as an artifact to inspect. Delete before merge.

on:
  push:
    branches:
      - devp-205-frontend-v8-coverage
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-docker:
    name: Prepare Docker (coverage)
    uses: ./.github/workflows/prepare-docker-reusable.yml
    with:
      build-variant: coverage
      runner: blacksmith-8vcpu-ubuntu-2204
    secrets: inherit

  e2e:
    name: E2E (coverage canary)
    needs: prepare-docker
    uses: ./.github/workflows/test-e2e-reusable.yml
    with:
      test-mode: docker-artifact
      # One spec that crosses UI -> engine -> nodes-base.
      test-command: pnpm --filter=n8n-playwright test:container:coverage tests/e2e/nodes/if-node.spec.ts
      workers: '1'
      runner: blacksmith-4vcpu-ubuntu-2204
      timeout-minutes: 30
      pre-generated-matrix: '[{"shard":1,"images":""}]'
      artifact-prefix: coverage-canary
      build-variant: coverage
    secrets: inherit

  aggregate:
    name: Aggregate Coverage (canary)
    needs: e2e
    if: always() && needs.e2e.result != 'skipped' && needs.e2e.result != 'cancelled'
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment
        uses: ./.github/actions/setup-nodejs

      - name: Download shard artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: coverage-canary-shard-*
          path: /tmp/shards/

      - name: Collect raw coverage (frontend monocart + backend V8)
        shell: bash
        run: |
          mkdir -p packages/testing/playwright/coverage/.cache
          mkdir -p packages/testing/playwright/coverage/.backend-v8
          fe=$(find /tmp/shards -path '*/coverage/.cache/*' -type f 2>/dev/null | wc -l)
          be=$(find /tmp/shards -path '*/coverage/.backend-v8/*' -name '*.json' -type f 2>/dev/null | wc -l)
          echo "Frontend monocart raw: $fe | backend V8 raw: $be"
          find /tmp/shards -path '*/coverage/.cache/*' -type f \
            -exec cp {} packages/testing/playwright/coverage/.cache/ \;
          find /tmp/shards -path '*/coverage/.backend-v8/*' -name '*.json' -type f \
            -exec sh -c 'cp "$1" "packages/testing/playwright/coverage/.backend-v8/be-$(echo "$1" | md5sum | cut -c1-12).json"' _ {} \;

      - name: Build (for backend source-map resolution)
        run: pnpm build

      - name: Generate Coverage Report
        env:
          N8N_COVERAGE_DIR: ${{ github.workspace }}/packages/testing/playwright/coverage/.backend-v8
        run: pnpm --filter n8n-playwright coverage:report

      - name: Coverage scope summary
        if: always()
        shell: bash
        run: |
          L=packages/testing/playwright/coverage/lcov.info
          {
            echo "## V8 coverage canary — package scope"
            echo '```'
            for p in frontend/editor-ui nodes-base core cli workflow @n8n; do
              printf '%-22s %s files\n' "$p" "$(grep -c "^SF:packages/$p/" "$L" 2>/dev/null || echo 0)"
            done
            echo "total: $(grep -c '^SF:' "$L" 2>/dev/null || echo 0) files"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Report Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-canary-report
          path: packages/testing/playwright/coverage/
          retention-days: 7
