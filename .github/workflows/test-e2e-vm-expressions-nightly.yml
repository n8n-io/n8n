name: 'Test: E2E VM Expressions Nightly'

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'GitHub branch/ref to test'
        required: false
        type: string
        default: 'master'

jobs:
  prepare-docker:
    name: 'Prepare Docker'
    uses: ./.github/workflows/prepare-docker-reusable.yml
    with:
      branch: ${{ github.event_name == 'schedule' && 'master' || inputs.branch }}
    secrets: inherit

  prepare-matrix:
    name: 'Prepare Matrix'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'schedule' && 'master' || inputs.branch }}
          fetch-depth: 1

      - name: Setup Environment
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: 'pnpm turbo run build --filter=@n8n/playwright-janitor'

      - name: Generate shard matrix
        id: generate
        run: |
          MATRIX=$(node packages/testing/playwright/scripts/distribute-tests.mjs --matrix 16 --orchestrate)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  e2e-vm-expressions:
    needs: [prepare-docker, prepare-matrix]
    uses: ./.github/workflows/test-e2e-ci-reusable.yml
    with:
      branch: ${{ github.event_name == 'schedule' && 'master' || inputs.branch }}
      matrix: ${{ needs.prepare-matrix.outputs.matrix }}
      n8n-env: '{"N8N_EXPRESSION_ENGINE":"vm"}'
    secrets: inherit

  notify-on-failure:
    name: Notify Slack on failure
    runs-on: ubuntu-slim
    needs: [e2e-vm-expressions]
    if: failure() && github.event_name == 'schedule'
    steps:
      - uses: act10ns/slack@44541246747a30eb3102d87f7a4cc5471b0ffb7d # v2.1.0
        with:
          status: ${{ job.status }}
          channel: '#project-secure-expression-evaluation'
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          message: "VM expression E2E nightly failed - ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
