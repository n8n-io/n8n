# Test harness for the full SBOM pipeline.
#
# Calls docker-build-push.yml with release_type=nightly so the sbom-attestation
# job fires — the same cdxgen → enrich-sbom → check-sbom-licenses → cosign attest
# path that runs on every production release. Use this to verify end-to-end SBOM
# output before merging changes to the license pipeline.

name: 'Test: Docker Build + syft SBOM'

on:
  push:
    branches:
      - chore/sca-license-posture

  workflow_dispatch:

jobs:
  test-sbom:
    name: 'Build + Push + SBOM Attestation (nightly path)'
    uses: ./.github/workflows/docker-build-push.yml
    with:
      n8n_version: 'test-sbom'
      release_type: 'nightly'
      push_enabled: true
    secrets: inherit
