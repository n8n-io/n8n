# TEMPORARY — delete before merge.
#
# Deterministically reproduces the DEVP-409 failure the FAITHFUL way: it injects
# a failing root `postinstall` into package.json (after checkout, never
# committed), then runs the REAL `pnpm install --frozen-lockfile` through the
# setup-nodejs composite. That produces a genuine `ELIFECYCLE` through pnpm's
# real reporter and the SafeChain shim — the same code path as the intermittent
# CI failures — instead of a synthetic non-pnpm exit.
#
# Editing only `scripts.postinstall` does not change dependency resolution, so
# `--frozen-lockfile` stays valid (verified locally).
#
# The matrix runs each case on BOTH a Blacksmith runner and a GitHub-hosted
# runner. The swallow reproduces in neither local nor container runs (incl. the
# exact compiled safe-chain binary + wrapper + timeout + tee), so the runner
# environment is the prime suspect. Running both side-by-side answers: is the
# swallow Blacksmith-specific, or general to GitHub Actions?
#
# What each case tells us (per runner):
#   - silent : postinstall exits 1 with NO output — the exact ticket scenario.
#   - with-output : postinstall prints FORCED_FAILURE_DETAIL_VISIBLE then exits 1.
#     Whether that string survives in the A (shim) vs B (real pnpm) logs is the
#     decisive signal for who/what swallows.
#
# Triggers on push to this branch (workflow_dispatch only works once the file is
# on the default branch, which it isn't yet). Every job is EXPECTED to fail —
# assert on the artifacts, not on success — so the job is marked non-blocking
# via continue-on-error to keep the branch/PR checks green.
#
# Inspect:   gh run download <run-id> -D /tmp/diag && find /tmp/diag
name: zz-temp Test install diagnostics

on:
  push:
    branches:
      - devp-409
  workflow_dispatch:

jobs:
  force-install-failure:
    # Run the SAME test on BOTH runner classes side-by-side so we can tell whether
    # the swallow is Blacksmith-specific or general to GitHub Actions. The swallow
    # reproduces in neither local nor container runs, so the runner environment is
    # the prime suspect — this isolates which one.
    runs-on: ${{ matrix.runner }}
    # Jobs are designed to fail; don't let that mark the run/PR as broken.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        runner:
          - blacksmith-4vcpu-ubuntu-2204 # Blacksmith (where the swallow was observed)
          - ubuntu-latest # GitHub-hosted control
        case:
          - { name: silent, postinstall: 'node -e "process.exit(1)"' }
          - { name: with-output, postinstall: 'node -e "console.error(''FORCED_FAILURE_DETAIL_VISIBLE''); process.exit(1)"' }
    name: force-fail (${{ matrix.case.name }} on ${{ matrix.runner }})
    steps:
      # Plain actions/checkout works on both runner classes; Blacksmith's caching
      # checkout is irrelevant to this diagnostic.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Inject a failing root postinstall (faithful ELIFECYCLE repro)
        shell: bash
        env:
          POSTINSTALL_CMD: ${{ matrix.case.postinstall }}
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.scripts = pkg.scripts || {};
            pkg.scripts.postinstall = process.env.POSTINSTALL_CMD;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
          '
          echo "Injected postinstall: $POSTINSTALL_CMD"

      - name: Run setup-nodejs (real pnpm install --frozen-lockfile, expected to fail)
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: '' # install fails first; skip build explicitly

      # Root cause (reproduced locally): n8n's .npmrc sets `loglevel = warn`, which
      # in a pnpm WORKSPACE suppresses lifecycle/build-script output. The action's
      # CLI `--loglevel=debug` does NOT override .npmrc here, but `--config.loglevel`
      # DOES. This step verifies the fix ON CI by running the same failing install
      # four ways and comparing what each captures:
      #   shim/real  ×  --loglevel=debug (broken)  vs  --config.loglevel=debug (fix)
      # Expectation: the two `--config.loglevel=debug` variants surface the full
      # reporter output (incl. FORCED_FAILURE_DETAIL_VISIBLE for with-output) while
      # the `--loglevel=debug` variants capture only `ELIFECYCLE`. `pnpm` is the
      # shim (-> compiled safe-chain binary); `$PNPM_HOME/pnpm` is the real binary.
      - name: 'Verify loglevel fix on CI (broken vs --config.loglevel)'
        if: always()
        shell: bash
        run: |
          run_variant() {
            local label="$1" bin="$2"; shift 2
            local log="$RUNNER_TEMP/v-$label.log"
            "$bin" install --frozen-lockfile "$@" > "$log" 2>&1 || true
            echo "[$label] lines=$(wc -l < "$log") visible=$(grep -c FORCED_FAILURE_DETAIL_VISIBLE "$log" || true) header=$(grep -c 'postinstall' "$log" || true)"
          }

          echo "::group::pnpm resolution"
          echo "runner label    = ${{ matrix.runner }} (RUNNER_NAME=$RUNNER_NAME, RUNNER_OS=$RUNNER_OS)"
          echo "command -v pnpm = $(command -v pnpm)"
          echo "real pnpm       = $PNPM_HOME/pnpm ($([ -x "$PNPM_HOME/pnpm" ] && echo executable || echo MISSING))"
          echo "::endgroup::"

          echo "::group::VERDICT (lines/visible/header per variant)"
          run_variant "shim-loglevel"        pnpm              --reporter=append-only --loglevel=debug
          run_variant "shim-config-loglevel" pnpm              --reporter=append-only --config.loglevel=debug
          run_variant "real-loglevel"        "$PNPM_HOME/pnpm" --reporter=append-only --loglevel=debug
          run_variant "real-config-loglevel" "$PNPM_HOME/pnpm" --reporter=append-only --config.loglevel=debug
          echo "::endgroup::"

          echo "::group::FIX OUTPUT — shim + --config.loglevel=debug (should contain the real error)"
          cat "$RUNNER_TEMP/v-shim-config-loglevel.log"
          echo "::endgroup::"

      - name: Upload variant logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ab-logs-${{ matrix.case.name }}-${{ matrix.runner }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/v-*.log
          if-no-files-found: ignore
          retention-days: 7
