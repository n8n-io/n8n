name: 'CI: MCP Workflow Evals'

# MCP workflow evals are manual only (workflow_dispatch). The build phase drives
# the `claude` CLI (Anthropic cost + rate limits), so there is no per-PR or
# scheduled run in this first version. NOTE: workflow_dispatch only becomes
# available once this workflow is on the default branch (master).
#
# TEMPORARY (remove before merge): the `pull_request` trigger below smoke-tests a
# single cheap case while this PR is open, because workflow_dispatch can't run a
# workflow that isn't on master yet. Strip the `pull_request:` trigger and the
# `github.event_name == 'pull_request'` fallbacks below before merging — only
# workflow_dispatch should remain.
on:
  pull_request: {}
  workflow_dispatch:
    inputs:
      branch:
        description: 'GitHub branch to test'
        required: false
        default: 'master'
      tier:
        description: 'Test-case dataset to build + eval (e.g. `mcp`, `full`)'
        required: false
        default: 'mcp'
      filter:
        description: 'Only build + eval test cases whose slug matches (comma-separated; empty = whole tier)'
        required: false
        default: ''
      iterations:
        description: 'Builds per test case (-n) and verifier iterations (use 10 for a baseline)'
        required: false
        default: '3'
      build-concurrency:
        description: 'Parallel claude build processes (-j)'
        required: false
        default: '3'
      eval-concurrency:
        description: 'Concurrent scenario executions in the verifier'
        required: false
        default: '6'
      model:
        description: 'Anthropic model id for the claude build step'
        required: false
        default: 'claude-sonnet-4-6'
      experiment-name:
        description: 'LangSmith experiment name (set to mcp-baseline to refresh the baseline)'
        required: false
        default: ''

concurrency:
  group: mcp-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-evals:
    name: MCP Workflow Evals
    if: github.repository == 'n8n-io/n8n'
    uses: ./.github/workflows/test-evals-mcp.yml
    with:
      branch: ${{ inputs.branch || github.sha }}
      tier: ${{ inputs.tier || 'mcp' }}
      # TEMPORARY pull_request smoke test: force one cheap case at minimal
      # concurrency. Dispatch runs use the declared input defaults instead.
      filter: ${{ inputs.filter || (github.event_name == 'pull_request' && 'contact-form-automation' || '') }}
      iterations: ${{ inputs.iterations || (github.event_name == 'pull_request' && '1' || '3') }}
      build-concurrency: ${{ inputs.build-concurrency || (github.event_name == 'pull_request' && '1' || '3') }}
      eval-concurrency: ${{ inputs.eval-concurrency || (github.event_name == 'pull_request' && '2' || '6') }}
      model: ${{ inputs.model || 'claude-sonnet-4-6' }}
      experiment-name: ${{ inputs.experiment-name || '' }}
    secrets: inherit
