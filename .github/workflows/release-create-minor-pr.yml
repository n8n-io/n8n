name: 'Release: Create Minor Release PR'

on:
  workflow_dispatch:
  schedule:
    - cron: 0 13 * * 1 # 2pm CET (UTC+1), Monday

jobs:
  create-release-pr:
    name: Create release PR
    uses: ./.github/workflows/release-create-pr.yml
    secrets: inherit
    with:
      base-branch: master
      release-type: minor
