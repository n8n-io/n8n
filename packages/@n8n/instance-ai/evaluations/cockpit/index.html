<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Instance AI eval cockpit</title>
		<style>
			:root {
				--bg: #14161a;
				--panel: #1c1f26;
				--border: #2c313b;
				--text: #e6e8ec;
				--muted: #8b93a1;
				--ok: #3fb950;
				--bad: #f85149;
				--busy: #d29922;
				--accent: #4c8dff;
			}
			* { box-sizing: border-box; }
			body {
				margin: 0;
				height: 100vh;
				display: grid;
				grid-template-columns: 280px 1fr;
				font: 13px/1.4 -apple-system, system-ui, sans-serif;
				background: var(--bg);
				color: var(--text);
			}
			#rail {
				border-right: 1px solid var(--border);
				display: flex;
				flex-direction: column;
				min-height: 0;
			}
			#rail header {
				padding: 10px 12px;
				border-bottom: 1px solid var(--border);
			}
			#rail header .row { display: flex; gap: 6px; margin-top: 8px; }
			button {
				background: var(--panel);
				color: var(--text);
				border: 1px solid var(--border);
				border-radius: 6px;
				padding: 5px 10px;
				cursor: pointer;
			}
			button:hover { border-color: var(--accent); }
			button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
			input[type='number'] { width: 48px; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px; }
			#list { overflow-y: auto; flex: 1; }
			.case {
				padding: 8px 12px;
				border-bottom: 1px solid var(--border);
				cursor: pointer;
				display: flex;
				align-items: center;
				gap: 8px;
			}
			.case:hover { background: #20242c; }
			.case.selected { background: #262b34; border-left: 3px solid var(--accent); padding-left: 9px; }
			.case .slug { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
			.dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
			.dot.idle { background: var(--muted); }
			.dot.queued, .dot.building, .dot.grading { background: var(--busy); animation: pulse 1s infinite; }
			.dot.done { background: var(--ok); }
			.dot.error { background: var(--bad); }
			@keyframes pulse { 50% { opacity: 0.3; } }
			#detail { display: grid; grid-template-columns: 1fr 1fr 1.2fr; min-height: 0; }
			.pane { display: flex; flex-direction: column; border-right: 1px solid var(--border); min-height: 0; }
			.pane:last-child { border-right: none; }
			.pane h2 { margin: 0; padding: 8px 12px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); border-bottom: 1px solid var(--border); }
			.pane .body { overflow: auto; flex: 1; padding: 10px 12px; }
			textarea { width: 100%; height: 100%; resize: none; border: none; background: transparent; color: var(--text); font: 12px/1.5 ui-monospace, Menlo, monospace; }
			.pane .actions { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid var(--border); }
			.msg { font-size: 12px; color: var(--muted); padding: 6px 12px; white-space: pre-wrap; }
			.msg.err { color: var(--bad); }
			.msg.ok { color: var(--ok); }
			.exp { padding: 8px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; }
			.exp .verdict { font-weight: 600; }
			.exp .verdict.pass { color: var(--ok); }
			.exp .verdict.fail { color: var(--bad); }
			.exp .reason { color: var(--muted); margin-top: 4px; }
			.exp .cal { display: flex; gap: 6px; margin-top: 6px; }
			.exp .cal button { font-size: 11px; padding: 3px 7px; }
			.group-title { font-size: 11px; text-transform: uppercase; color: var(--muted); margin: 10px 0 6px; }
			iframe { flex: 1; border: none; background: #fff; width: 100%; }
			.frame-hint { padding: 6px 12px; font-size: 11px; color: var(--busy); border-top: 1px solid var(--border); }
		</style>
	</head>
	<body>
		<div id="rail">
			<header>
				<strong>Eval cockpit</strong>
				<div class="row">
					<button class="primary" onclick="runAll()">Run all</button>
					<button onclick="runSelected()">Run selected</button>
					<label style="margin-left:auto; color:var(--muted)">conc <input id="conc" type="number" min="1" value="4" /></label>
				</div>
			</header>
			<div id="list"></div>
		</div>

		<div id="detail">
			<div class="pane">
				<h2>Case</h2>
				<div class="body" style="padding:0"><textarea id="caseJson" spellcheck="false" placeholder="Select a case…"></textarea></div>
				<div id="caseMsg" class="msg"></div>
				<div class="actions">
					<button onclick="validateCase()">Validate</button>
					<button class="primary" onclick="runSelected()">Run this case</button>
				</div>
			</div>

			<div class="pane">
				<h2>Expectations</h2>
				<div class="body" id="expectations"><div class="msg">Select a case to see its expectations.</div></div>
			</div>

			<div class="pane">
				<h2>Instance AI</h2>
				<iframe id="frame" title="Instance AI builder"></iframe>
				<div class="frame-hint">Blank? The instance must run in dev mode (<code>pnpm dev</code>) — production mode blocks framing.</div>
			</div>
		</div>

		<script>
			let selected = null;
			let casesState = [];

			async function api(method, path, body) {
				const res = await fetch(path, {
					method,
					headers: body ? { 'content-type': 'application/json' } : undefined,
					body: body ? JSON.stringify(body) : undefined,
				});
				return res.json();
			}

			async function pollCases() {
				try {
					const data = await api('GET', '/cases');
					casesState = data.cases;
					renderList();
				} catch (e) {
					/* transient — keep last state */
				}
			}

			function renderList() {
				const list = document.getElementById('list');
				list.innerHTML = '';
				for (const c of casesState) {
					const row = document.createElement('div');
					row.className = 'case' + (c.slug === selected ? ' selected' : '');
					row.onclick = () => selectCase(c.slug);
					row.innerHTML =
						'<span class="dot ' + c.status + '"></span><span class="slug">' + c.slug + '</span>';
					list.appendChild(row);
				}
			}

			async function selectCase(slug) {
				selected = slug;
				renderList();
				const data = await api('GET', '/case?slug=' + encodeURIComponent(slug));
				document.getElementById('caseJson').value = data.json || '';
				document.getElementById('caseMsg').textContent = '';
				const c = casesState.find((x) => x.slug === slug);
				const frame = document.getElementById('frame');
				frame.src = c && c.laneBaseUrl ? c.laneBaseUrl : 'about:blank';
				renderExpectations();
			}

			function currentCaseObject() {
				try {
					return JSON.parse(document.getElementById('caseJson').value);
				} catch (e) {
					return null;
				}
			}

			async function renderExpectations() {
				const el = document.getElementById('expectations');
				const obj = currentCaseObject();
				if (!obj) {
					el.innerHTML = '<div class="msg err">Case JSON is not valid — fix it in the Case pane.</div>';
					return;
				}
				let result = null;
				try {
					const r = await fetch('/result?slug=' + encodeURIComponent(selected));
					if (r.ok) result = await r.json();
				} catch (e) {
					/* no result yet */
				}
				el.innerHTML = '';
				renderGroup(el, 'Outcome expectations', obj.outcomeExpectations, result, 'outcome');
				renderGroup(el, 'Process expectations', obj.processExpectations, result, 'process');
				renderScenarios(el, obj.executionScenarios, result);
				if (!obj.outcomeExpectations && !obj.processExpectations && !obj.executionScenarios) {
					el.innerHTML = '<div class="msg">No expectations or scenarios in this case.</div>';
				}
			}

			function findVerdict(result, kind, text, index) {
				if (!result) return null;
				if (kind === 'scenario') {
					const s = (result.executionScenarioResults || [])[index];
					return s ? { pass: s.success, reason: s.reasoning } : null;
				}
				const be = (result.buildExpectationResults || []).find((b) => b.expectation === text);
				return be ? { pass: be.pass, reason: be.reason } : null;
			}

			function renderGroup(el, title, items, result, kind) {
				if (!items || !items.length) return;
				const h = document.createElement('div');
				h.className = 'group-title';
				h.textContent = title;
				el.appendChild(h);
				items.forEach((text, i) => {
					const v = findVerdict(result, kind, text, i);
					el.appendChild(expCard(text, v));
				});
			}

			function renderScenarios(el, scenarios, result) {
				if (!scenarios || !scenarios.length) return;
				const h = document.createElement('div');
				h.className = 'group-title';
				h.textContent = 'Execution scenarios';
				el.appendChild(h);
				scenarios.forEach((sc, i) => {
					const v = findVerdict(result, 'scenario', sc.name, i);
					el.appendChild(expCard(sc.name + ' — ' + (sc.successCriteria || ''), v));
				});
			}

			function expCard(text, verdict) {
				const card = document.createElement('div');
				card.className = 'exp';
				const label = verdict ? (verdict.pass ? '✅ pass' : '❌ fail') : '⏳ not run';
				const cls = verdict ? (verdict.pass ? 'pass' : 'fail') : '';
				card.innerHTML =
					'<div class="verdict ' + cls + '">' + label + '</div><div>' + escapeHtml(text) + '</div>' +
					(verdict && verdict.reason ? '<div class="reason">' + escapeHtml(verdict.reason) + '</div>' : '');
				if (verdict && !verdict.pass) {
					const cal = document.createElement('div');
					cal.className = 'cal';
					cal.appendChild(verdictButton('Harness note', 'harness'));
					cal.appendChild(verdictButton('Capability-gap', 'capability-gap'));
					card.appendChild(cal);
				}
				return card;
			}

			function verdictButton(label, category) {
				const b = document.createElement('button');
				b.textContent = label;
				b.onclick = async () => {
					const note = prompt(label + ' — describe why (written to the case description):');
					if (!note) return;
					const res = await api('POST', '/verdict?slug=' + encodeURIComponent(selected), {
						category,
						note,
					});
					if (res.description !== undefined) {
						// reflect the updated description back into the editor
						const obj = currentCaseObject();
						if (obj) {
							obj.description = res.description;
							document.getElementById('caseJson').value = JSON.stringify(obj, null, 2);
						}
						setMsg('caseMsg', 'ok', 'Verdict written to description.');
					}
				};
				return b;
			}

			async function validateCase() {
				if (!selected) return;
				// The case JSON is the request body verbatim (not wrapped) — the server
				// parses the body as the case and validates it against the schema.
				const raw = await fetch('/case?slug=' + encodeURIComponent(selected), {
					method: 'PUT',
					headers: { 'content-type': 'application/json' },
					body: document.getElementById('caseJson').value,
				});
				const res = await raw.json();
				if (res.ok) {
					setMsg('caseMsg', 'ok', 'Valid — saved.');
					renderExpectations();
				} else {
					setMsg('caseMsg', 'err', (res.errors || ['invalid']).join('\n'));
				}
			}

			async function runSelected() {
				if (!selected) return;
				await api('POST', '/run', { slugs: [selected], concurrency: concValue() });
				pollCases();
			}

			async function runAll() {
				await api('POST', '/run', { concurrency: concValue() });
				pollCases();
			}

			function concValue() {
				return Number(document.getElementById('conc').value) || 4;
			}

			function setMsg(id, cls, text) {
				const el = document.getElementById(id);
				el.className = 'msg ' + cls;
				el.textContent = text;
			}

			function escapeHtml(s) {
				return String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
			}

			pollCases();
			setInterval(pollCases, 1500);
		</script>
	</body>
</html>
