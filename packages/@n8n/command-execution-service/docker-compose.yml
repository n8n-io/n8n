services:
  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: sh -c "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/command-execution"

  command-execution-service:
    build:
      context: ../../..
      dockerfile: packages/@n8n/command-execution-service/Dockerfile
    ports:
      - '5682:5682'
    environment:
      COMMAND_SERVICE_HOST: '0.0.0.0'
      COMMAND_SERVICE_S3_BUCKET: command-execution
      COMMAND_SERVICE_S3_ENDPOINT: http://minio:9000
      COMMAND_SERVICE_S3_ACCESS_KEY: minioadmin
      COMMAND_SERVICE_S3_SECRET_KEY: minioadmin
    depends_on:
      minio-init:
        condition: service_completed_successfully
    security_opt:
      - seccomp:unconfined
      - label:disable
    cap_add:
      - SYS_ADMIN
