type: object
properties:
  id:
    type: number
    example: 1000
  data:
    type: object
    additionalProperties: true
    description: >
      Detailed execution data. Only included when `includeData` is `true`.
    properties:
      redactionInfo:
        type: object
        nullable: true
        description: Present when execution data has been redacted.
        properties:
          isRedacted:
            type: boolean
            description: Whether the execution data was redacted.
          reason:
            type: string
            description: The reason for redaction.
          canReveal:
            type: boolean
            description: Whether the current user has permission to reveal the redacted data.
  finished:
    type: boolean
    example: true
  mode:
    type: string
    enum:
      [
        'cli',
        'error',
        'integrated',
        'internal',
        'manual',
        'retry',
        'trigger',
        'webhook',
        'evaluation',
        'chat',
      ]
  retryOf:
    type: number
    nullable: true
  retrySuccessId:
    type: number
    nullable: true
    example: '2'
  startedAt:
    type: string
    format: date-time
  stoppedAt:
    type: string
    format: date-time
    nullable: true
    description: The time at which the execution stopped. Will only be null for executions that still have the status 'running'.
  workflowId:
    type: number
    example: '1000'
  waitTill:
    type: string
    nullable: true
    format: date-time
  customData:
    type: object
  status:
    type: string
    enum: ['canceled', 'crashed', 'error', 'new', 'running', 'success', 'unknown', 'waiting']
