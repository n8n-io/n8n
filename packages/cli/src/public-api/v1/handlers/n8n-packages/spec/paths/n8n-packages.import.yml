post:
  x-eov-operation-id: importPackage
  x-required-scope: workflow:import
  x-eov-operation-handler: v1/handlers/n8n-packages/n8n-packages.handler
  tags:
    - N8nPackage
  summary: 'Beta: Import an n8n package into a project'
  description: |
    **Beta — disabled by default.** Set `N8N_PUBLIC_API_PACKAGES_ENABLED=true` on the
    instance to enable this endpoint. While disabled, requests return `404`.

    Imports a gzip-compressed tar package (`.n8np`) into the target project. Send the
    archive as the multipart field `package`. Optional routing uses form fields
    `projectId` and `folderId` (omit or send empty for defaults). The optional
    `credentialMatchingMode`, `credentialMissingMode`, `credentialBindings`,
    `workflowIdPolicy`, and `workflowPublishingPolicy` fields take their defaults when omitted. The required
    `workflowConflictPolicy` field controls what happens when a package workflow
    matches an existing workflow by source id in the target project. Maximum upload
    size is `N8N_ENDPOINTS_PAYLOAD_SIZE_MAX` MB (default 16).

    The package must declare its manifest at `manifest.json` and include every file
    referenced by the manifest. The caller is authorised through the `workflow:import`
    scope. With the default `workflowIdPolicy=new`, newly created workflows receive a
    fresh local id; imported workflows arrive inactive unless `workflowPublishingPolicy`
    publishes them after import.

    Credential references are resolved before any workflow is written. Only credentials owned by the
    target project (with `credential:read`) or global credentials (with `credential:read`)
    match. Credentials shared into the project as `credential:user` are not matched.
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required:
            - package
            - workflowConflictPolicy
          properties:
            package:
              type: string
              format: binary
              description: Gzip-compressed tar package (`.n8np`).
            projectId:
              type: string
              description: >
                Target project id. Omit or send empty to import into the caller's
                personal project.
            folderId:
              type: string
              description: >
                Optional folder within the target project. Omit or send empty for
                project root.
            credentialMatchingMode:
              type: string
              enum:
                - id-only
              default: id-only
              description: >
                How credential references in `requirements.credentials` are matched on
                the target instance. Only `id-only` is supported today.
            credentialMissingMode:
              type: string
              enum:
                - must-preexist
              default: must-preexist
              description: >
                What to do when a credential reference cannot be resolved.
                `must-preexist` requires every referenced credential to already
                exist and be accessible on the target instance.
            credentialBindings:
              type: string
              default: '{}'
              description: >
                Optional JSON object mapping credential ids from the package
                manifest to credential ids on the target instance. These explicit
                bindings are validated and applied before `credentialMatchingMode`
                resolution runs.
            workflowConflictPolicy:
              type: string
              enum:
                - new-version
                - fail
                - skip
              description: >
                `new-version` updates matching workflows and creates a new version,
                `fail` rejects the import when any matching workflow exists, and
                `skip` leaves matching workflows unchanged.
            workflowIdPolicy:
              type: string
              enum:
                - new
                - source
              default: new
              description: >
                Controls the id each newly created workflow receives. `new`
                (default) mints a fresh id and records the package id as
                `sourceWorkflowId`, so the same package can be imported
                repeatedly without id collisions. `source` reuses the package's
                own workflow id on the target instance. Workflows matched to an
                existing workflow in the target project (status `updated` or
                `skipped`) always keep that workflow's current id, regardless
                of policy.
            workflowPublishingPolicy:
              type: string
              enum:
                - preserve-published-state
                - match-source
                - publish-all
                - unpublish-all
              default: preserve-published-state
              description: >
                Controls whether imported workflows are published after content is
                written. `preserve-published-state` keeps new workflows inactive and
                republishes an updated workflow only when it was already published and
                the package workflow is published too, so drafts are never published.
                `match-source` follows the package workflow's published flag.
                `publish-all` publishes every imported workflow.
                `unpublish-all` leaves new workflows inactive and unpublishes
                updated workflows that were published.
  responses:
    '200':
      description: Import succeeded; the listed workflows were written to the target project.
      content:
        application/json:
          schema:
            type: object
            required:
              - package
              - workflows
              - bindings
            properties:
              package:
                type: object
                required:
                  - sourceN8nVersion
                  - sourceId
                  - exportedAt
                properties:
                  sourceN8nVersion:
                    type: string
                  sourceId:
                    type: string
                  exportedAt:
                    type: string
                    format: date-time
              workflows:
                type: array
                items:
                  type: object
                  required:
                    - sourceWorkflowId
                    - localId
                    - name
                    - projectId
                    - parentFolderId
                    - activeVersionId
                    - status
                  properties:
                    sourceWorkflowId:
                      type: string
                      description: Workflow id as it appeared in the package.
                    localId:
                      type: string
                      description: >
                        Workflow id on the target instance: newly assigned for
                        `created` (fresh under `workflowIdPolicy=new`, the
                        package id under `source`), the existing workflow's id
                        for `updated`/`skipped`.
                    name:
                      type: string
                    projectId:
                      type: string
                    parentFolderId:
                      type: string
                      nullable: true
                    activeVersionId:
                      type: string
                      nullable: true
                      description: >
                        Published version on the target instance, if any. `null` when the
                        workflow is not published after import.
                    status:
                      type: string
                      enum:
                        - created
                        - updated
                        - skipped
                      description: Import outcome for this package workflow.
              bindings:
                type: object
                description: >
                  Source id → target id mappings produced during import, one map per
                  entity type. Each value maps an id as it appeared in the package to
                  the id on the target instance.
                required:
                  - workflows
                  - credentials
                properties:
                  workflows:
                    type: object
                    additionalProperties:
                      type: string
                  credentials:
                    type: object
                    description: >
                      Credential id from `requirements.credentials` in the package
                      manifest → matched credential id on the target instance.
                    additionalProperties:
                      type: string
    '409':
      description: >
        Import blocked, with at least one workflow source-id conflict among the
        issues.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
              - issues
            properties:
              message:
                type: string
              issues:
                type: array
                items:
                  $ref: '../schemas/importBlockingIssue.yml'
    '422':
      description: >
        Import blocked by non-conflict issues only (e.g. unresolved credentials).
      content:
        application/json:
          schema:
            type: object
            required:
              - message
              - issues
            properties:
              message:
                type: string
              issues:
                type: array
                items:
                  $ref: '../schemas/importBlockingIssue.yml'
    '400':
      $ref: '../../../../shared/spec/responses/badRequest.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '403':
      $ref: '../../../../shared/spec/responses/forbidden.yml'
    '404':
      $ref: '../../../../shared/spec/responses/notFound.yml'
