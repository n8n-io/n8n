type: object
required:
  - file
  - id
  - name
  - type
  - status
  - location
  - conflict
  - updatedAt
properties:
  file:
    type: string
  id:
    type: string
  name:
    type: string
  type:
    type: string
    enum:
      - credential
      - workflow
      - tags
      - variables
      - file
      - folders
      - project
      - datatable
  status:
    type: string
    enum:
      - new
      - modified
      - deleted
      - created
      - renamed
      - conflicted
      - ignored
      - staged
      - unknown
  location:
    type: string
    enum:
      - local
      - remote
  conflict:
    type: boolean
  updatedAt:
    type: string
  pushed:
    type: boolean
  isLocalPublished:
    type: boolean
  isRemoteArchived:
    type: boolean
  parentFolderId:
    type: string
    nullable: true
  folderPath:
    type: array
    items:
      type: string
  owner:
    type: object
    required:
      - type
      - projectId
      - projectName
    properties:
      type:
        type: string
        enum:
          - personal
          - team
      projectId:
        type: string
      projectName:
        type: string
  publishingError:
    type: string
