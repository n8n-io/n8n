type: object
properties:
  force:
    type: boolean
    example: false
  commitMessage:
    type: string
    example: 'chore: automated daily push'
  ids:
    type: array
    description: >
      Simple list of workflow or credential IDs to push (e.g. ["abc123", "def456"]).
      Takes precedence over fileNames. If both ids and fileNames are omitted or empty,
      all eligible files will be pushed.
    items:
      type: string
    example: ['abc123', 'def456']
  fileNames:
    type: array
    description: >
      List of full file objects to push. Use ids instead for a simpler interface.
      If both ids and fileNames are omitted or empty, all eligible files will be pushed.
    items:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [workflow, credential, variables, tags, folders, project, datatable]
        status:
          type: string
          enum: [new, modified, deleted, renamed, conflicted, ignored]
        location:
          type: string
          enum: [local, remote]
        conflict:
          type: boolean
        file:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - type
        - status
        - location
        - conflict
        - file
        - updatedAt
