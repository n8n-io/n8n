put:
  x-eov-operation-id: shareCredential
  x-eov-operation-handler: v1/handlers/credentials/credentials.handler
  tags:
    - Credential
  summary: Share a credential with projects
  description: Share a credential with one or more projects. The request body contains the complete list of project IDs that the credential should be shared with (replacing any existing shares, except the owner).
  operationId: shareCredential
  parameters:
    - $ref: '../schemas/parameters/credentialId.yml'
  requestBody:
    description: List of project IDs to share the credential with
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - shareWithIds
          properties:
            shareWithIds:
              type: array
              items:
                type: string
              description: Array of project IDs to share the credential with. This replaces the current sharing list (owner sharing is preserved).
  responses:
    '200':
      description: Operation successful.
    '400':
      $ref: '../../../../shared/spec/responses/badRequest.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '403':
      $ref: '../../../../shared/spec/responses/forbidden.yml'
    '404':
      $ref: '../../../../shared/spec/responses/notFound.yml'
