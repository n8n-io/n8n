put:
  x-eov-operation-id: shareCredential
  x-eov-operation-handler: v1/handlers/credentials/credentials.handler
  tags:
    - Credential
  parameters:
    - name: id
      in: path
      description: The ID of the credential.
      required: true
      schema:
        type: string
  summary: Share a credential with projects.
  description: >-
    Share a credential with one or more projects using replace-set semantics:
    the request body lists the full set of project IDs the credential should be
    shared with. Projects not included in the list will have their access
    revoked. To share with an individual user, pass that user's personal project
    ID; to share with a workspace, pass the team project ID.
  requestBody:
    description: Project IDs the credential should be shared with.
    content:
      application/json:
        schema:
          type: object
          properties:
            shareWithIds:
              type: array
              description: >-
                Full list of project IDs the credential should be shared with.
                The server diffs this list against the current sharees and adds
                or removes shares accordingly.
              items:
                type: string
          required:
            - shareWithIds
    required: true
  responses:
    '204':
      description: Operation successful.
    '400':
      $ref: '../../../../shared/spec/responses/badRequest.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '403':
      $ref: '../../../../shared/spec/responses/forbidden.yml'
    '404':
      $ref: '../../../../shared/spec/responses/notFound.yml'
