type: object
additionalProperties:
  type: object
  required:
    - credentialId
    - dataTableId
    - errorWorkflow
    - errorWorkflowParent
    - workflowCall
    - workflowParent
  properties:
    credentialId:
      type: integer
      description: Number of credential dependencies.
    dataTableId:
      type: integer
      description: Number of data table dependencies.
    errorWorkflow:
      type: integer
      description: Number of error workflow dependencies.
    errorWorkflowParent:
      type: integer
      description: Number of workflows that reference this resource as an error workflow.
    workflowCall:
      type: integer
      description: Number of sub-workflow call dependencies.
    workflowParent:
      type: integer
      description: Number of parent workflows that depend on this resource.
description: |
  Map of resource ID to dependency counts. Only resources the user has access to are included.
  Resources that are inaccessible or have no dependencies are omitted.
