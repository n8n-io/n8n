post:
  operationId: getResourceDependencies
  x-eov-operation-id: getResourceDependencies
  x-required-scope: workflow:read,credential:read,dataTable:listProject
  x-eov-operation-handler: v1/handlers/workflow-dependencies/workflow-dependencies.handler
  tags:
    - Workflow
  summary: Get resource dependencies
  description: Retrieve resolved dependency details (including names and types) for the specified resources. Dependencies that the user cannot access are counted in `inaccessibleCount`. Resources that no longer exist are omitted.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/get-resource-dependencies-request.yml'
  responses:
    '200':
      description: Operation successful.
      content:
        application/json:
          schema:
            $ref: '../schemas/dependency-details-response.yml'
    '400':
      $ref: '../../../../shared/spec/responses/badRequest.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '403':
      $ref: '../../../../shared/spec/responses/forbidden.yml'
