type: object
properties:
  data:
    type: array
    items:
      $ref: './ldap-sync-history.yml'
  nextCursor:
    type: string
    nullable: true
    description: >
      Paginate through the synchronization history by setting the cursor parameter to the
      nextCursor attribute returned by the previous request. A null value means there are
      no more records.
    example: MTIzZTQ1NjctZTg5Yi0xMmQzLWE0NTYtNDI2NjE0MTc0MDA
