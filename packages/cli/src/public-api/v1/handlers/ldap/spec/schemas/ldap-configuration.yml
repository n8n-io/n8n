type: object
additionalProperties: false
description: >
  Full LDAP configuration. Every field is returned by GET; send the full object
  back as PUT body.
required:
  - loginEnabled
  - loginLabel
  - connectionUrl
  - allowUnauthorizedCerts
  - connectionSecurity
  - connectionPort
  - baseDn
  - bindingAdminDn
  - bindingAdminPassword
  - firstNameAttribute
  - lastNameAttribute
  - emailAttribute
  - loginIdAttribute
  - ldapIdAttribute
  - userFilter
  - synchronizationEnabled
  - synchronizationInterval
  - searchPageSize
  - searchTimeout
  - enforceEmailUniqueness
properties:
  loginEnabled:
    type: boolean
    description: Whether LDAP login is enabled.
    example: false
  loginLabel:
    type: string
    description: Label shown on the LDAP login button.
    example: LDAP
  connectionUrl:
    type: string
    description: LDAP server URL.
    example: ldap://ldap.example.com
  allowUnauthorizedCerts:
    type: boolean
    description: Whether to allow unauthorized (self-signed) certificates.
    example: false
  connectionSecurity:
    type: string
    enum: [none, tls, startTls]
    description: TLS/SSL security mode for the LDAP connection.
    example: none
  connectionPort:
    type: integer
    description: LDAP server port.
    example: 389
  baseDn:
    type: string
    description: Base DN for LDAP search queries.
    example: dc=example,dc=com
  bindingAdminDn:
    type: string
    description: DN of the LDAP admin user for binding.
    example: cn=admin,dc=example,dc=com
  bindingAdminPassword:
    type: string
    description: >
      Password for the LDAP admin user. Redacted on GET; returns the blanking
      placeholder when a password is stored, empty string when unset. Send the
      blanking placeholder from a prior GET to keep the stored password unchanged.
  firstNameAttribute:
    type: string
    description: LDAP attribute mapped to the user's first name.
    example: givenName
  lastNameAttribute:
    type: string
    description: LDAP attribute mapped to the user's last name.
    example: sn
  emailAttribute:
    type: string
    description: LDAP attribute mapped to the user's email.
    example: mail
  loginIdAttribute:
    type: string
    description: LDAP attribute used for login (usually the same as emailAttribute).
    example: mail
  ldapIdAttribute:
    type: string
    description: LDAP attribute that uniquely identifies a user.
    example: uid
  userFilter:
    type: string
    description: >
      Additional LDAP filter to apply when searching for users. Use an empty string
      for no additional filter.
    example: (objectClass=inetOrgPerson)
  synchronizationEnabled:
    type: boolean
    description: Whether automatic LDAP synchronization is enabled.
    example: false
  synchronizationInterval:
    type: integer
    description: Interval in minutes between automatic synchronizations. Ignored if synchronizationEnabled is false.
    example: 60
  searchPageSize:
    type: integer
    description: Number of LDAP entries to fetch per search page.
    example: 1000
  searchTimeout:
    type: integer
    description: LDAP search timeout in seconds.
    example: 60
  enforceEmailUniqueness:
    type: boolean
    description: >
      Whether to enforce that email addresses are unique across LDAP users. When true,
      if two users have the same email, only the first will be imported.
    example: true
