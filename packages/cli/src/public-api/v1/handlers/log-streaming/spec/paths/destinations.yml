get:
  x-eov-operation-id: getDestinations
  x-required-scope: eventBusDestination:list
  x-eov-operation-handler: v1/handlers/log-streaming/log-streaming.handler
  tags:
    - LogStreaming
  summary: List log streaming destinations
  description: >
    List the configured log streaming destinations. Requires the `eventBusDestination:list`
    scope and the Log Streaming feature to be licensed.
  responses:
    '200':
      description: Operation successful.
      content:
        application/json:
          schema:
            $ref: '../schemas/destination.list.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '403':
      $ref: '../../../../shared/spec/responses/forbidden.yml'
post:
  x-eov-operation-id: createDestination
  x-required-scope: eventBusDestination:create
  x-eov-operation-handler: v1/handlers/log-streaming/log-streaming.handler
  tags:
    - LogStreaming
  summary: Create a log streaming destination
  description: >
    Create a log streaming destination. The destination takes effect exactly as it would from
    the UI, using the same validation. Requires the `eventBusDestination:create` scope and the
    Log Streaming feature to be licensed. When destinations are managed via environment
    variables, the write is rejected with 409 and nothing is created; reads still return the
    current values.
  requestBody:
    description: The destination to create.
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/destination.yml'
  responses:
    '200':
      description: Operation successful.
      content:
        application/json:
          schema:
            $ref: '../schemas/destination.yml'
    '400':
      $ref: '../../../../shared/spec/responses/badRequest.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '403':
      $ref: '../../../../shared/spec/responses/forbidden.yml'
    '409':
      $ref: '../../../../shared/spec/responses/conflict.yml'
