get:
  tags:
    - DataTable
  summary: List all data tables
  description: Retrieve a list of all data tables with optional filtering,
    sorting, and pagination.
  operationId: list-data-tables
  x-eov-operation-id: listDataTables
  x-required-scope: dataTable:list
  x-eov-operation-handler: v1/handlers/data-tables/data-tables.handler
  security:
    - ApiKeyAuth: []
  parameters:
    - $ref: ../../../../shared/spec/parameters/limit.yml
    - $ref: ../../../../shared/spec/parameters/cursor.yml
    - in: query
      name: filter
      description: JSON string of filter conditions
      schema:
        type: string
        format: jsonString
        description: JSON string of filter conditions
        example: '{"name":"my-table"}'
    - in: query
      name: sortBy
      description: 'Sort format: field:asc or field:desc'
      schema:
        type: string
        enum:
          - name:asc
          - name:desc
          - createdAt:asc
          - createdAt:desc
          - updatedAt:asc
          - updatedAt:desc
          - size:asc
          - size:desc
        description: 'Sort format: field:asc or field:desc'
        example: name:asc
  responses:
    '200':
      description: Successfully retrieved data tables
      content:
        application/json:
          schema:
            $ref: ../schemas/dataTableList.yml
    '400':
      $ref: ../../../../shared/spec/responses/badRequest.yml
    '401':
      $ref: ../../../../shared/spec/responses/unauthorized.yml
post:
  tags:
    - DataTable
  summary: Create a new data table
  description: Create a new data table in your personal project or a team project
    you have access to.
  operationId: create-data-table
  x-eov-operation-id: createDataTable
  x-required-scope: dataTable:create
  x-eov-operation-handler: v1/handlers/data-tables/data-tables.handler
  security:
    - ApiKeyAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/createDataTableRequest.generated.yml
        examples:
          personalProject:
            summary: Default (personal project)
            value:
              name: customers
              columns:
                - name: email
                  type: string
                - name: status
                  type: string
                - name: age
                  type: number
          scopedProject:
            summary: Explicit project
            value:
              name: customers
              projectId: a1b2c3d4
              columns:
                - name: email
                  type: string
                - name: status
                  type: string
  responses:
    '201':
      description: Data table created successfully
      content:
        application/json:
          schema:
            $ref: ../schemas/dataTable.yml
    '400':
      $ref: ../../../../shared/spec/responses/badRequest.yml
    '401':
      $ref: ../../../../shared/spec/responses/unauthorized.yml
    '403':
      $ref: ../../../../shared/spec/responses/forbidden.yml
    '409':
      $ref: ../../../../shared/spec/responses/conflict.yml
