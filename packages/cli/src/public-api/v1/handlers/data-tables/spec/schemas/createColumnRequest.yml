type: object
properties:
  name:
    type: string
    description: Column name
    minLength: 1
    maxLength: 63
    pattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
  type:
    type: string
    enum: [string, number, boolean, date]
    description: Column data type
  index:
    type: integer
    minimum: 0
    description: Column position (optional, appended to end if omitted)
required:
  - name
  - type
