type: object
description: |
  Provide `name`, `projectId`, or both.
properties:
  name:
    type: string
    description: New name for the data table
    minLength: 1
    maxLength: 128
  projectId:
    type: string
    description: |
      ID of the project to move this table into. Combine with `name` to transfer and rename in one update.
