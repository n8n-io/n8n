type: object
properties:
  name:
    type: string
    minLength: 1
    maxLength: 128
    description: Name of the data table
  columns:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
          pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
          minLength: 1
          maxLength: 63
          description: Column name
        type:
          type: string
          enum:
            - string
            - number
            - boolean
            - date
          description: Column data type
        csvColumnName:
          type: string
      required:
        - name
        - type
    description: Column definitions for the table
  fileId:
    type: string
  hasHeaders:
    type: boolean
  projectId:
    type: string
    description: ID of the project to create the table in. When omitted, the table
      is created in the user's personal project.
required:
  - name
  - columns
