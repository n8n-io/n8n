get:
  x-eov-operation-id: getTestRuns
  x-required-scope: testRun:list
  x-eov-operation-handler: v1/handlers/evaluations/evaluations.handler
  tags:
    - Evaluation
  summary: Retrieve test runs
  description: Retrieve the evaluation test runs of a workflow.
  parameters:
    - $ref: '../schemas/parameters/testRunWorkflowId.yml'
    - name: status
      in: query
      description: Status to filter the test runs by.
      required: false
      schema:
        type: string
        enum: ['new', 'running', 'completed', 'error', 'cancelled']
    - $ref: '../../../../shared/spec/parameters/limit.yml'
    - $ref: '../../../../shared/spec/parameters/cursor.yml'
  responses:
    '200':
      description: Operation successful.
      content:
        application/json:
          schema:
            $ref: '../schemas/testRunList.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '402':
      $ref: '../../../../shared/spec/responses/paymentRequired.yml'
    '403':
      $ref: '../../../../shared/spec/responses/forbidden.yml'
    '404':
      $ref: '../../../../shared/spec/responses/notFound.yml'
